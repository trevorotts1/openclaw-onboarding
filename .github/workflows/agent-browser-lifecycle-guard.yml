name: agent-browser lifecycle guard

# SINGLETON POOLED BROWSER — one session, lock=1, TTL, guaranteed teardown,
# reaper backstop. This guard FAILS the build if any code under Skill 06 launches
# agent-browser OUTSIDE the single mandatory gateway (tools/browser_manager.sh),
# if the gateway loses its teardown trap / lock / close+state-clear / breaker, if
# a 06 doc reintroduces a per-iteration session name, or if the doctrine sentinel
# is missing from the Skill 06 docs. It then runs the static singleton pytest.
#
# WHY: verified live damage (operator box, 2026-06-23) — 22 orphan
# ~/.agent-browser/*.engine descriptors (357M) because the 06 tools used a fresh
# per-iteration session name and had ZERO teardown. A regression past this guard
# can never reach a passing build.
#
# Triggers on every push to main and every PR targeting main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  agent-browser-lifecycle-guard:
    name: agent-browser lifecycle guard (singleton gateway + teardown + reaper)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        shell: bash
        run: pip install --quiet pytest

      - name: Run singleton gateway guard
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/guard-agent-browser-managed.sh
          echo "✓ Skill 06 singleton pooled-browser gateway enforced (managed-only, teardown+lock+breaker, no per-run names, sentinel present)"

      - name: Run static singleton tests
        shell: bash
        run: |
          set -euo pipefail
          pytest 06-ghl-install-pages/tests/test_browser_manager_singleton.py -q
