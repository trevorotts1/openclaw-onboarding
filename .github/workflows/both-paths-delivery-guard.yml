# .github/workflows/both-paths-delivery-guard.yml
#
# Unified both-paths delivery guard (v14.27.0).
#
# Runs on every PR and push to main. Asserts STATICALLY (offline grep —
# no runtime, no network) that BOTH install.sh AND update-skills.sh carry
# every delivery dimension that all prior PRs (#398-#412) were supposed to
# close. A dimension missing from either path is a regression.
#
# Dimensions checked (11 total):
#   D1  Section-tagged 54-persona index  provision_persona_index
#   D2  GHL funnel catalog wiring        wire_ghl_funnel_catalog
#   D3  Dept agent registration          materialize-dept-agents
#   D4  Routing keys applied             apply-routing-fix (runtime script;
#       agentToAgent/allowAgents/visibility are NOT written verbatim in
#       install.sh or update-skills.sh — apply-routing-fix.sh applies them
#       at runtime. D4 verifies that script is invoked on BOTH paths.)
#   D5  CC web-app refresh               run-full-install (install.sh: Step 15b
#       copy so Skill-37 agent has it + update-skills.sh: --update-only invocation
#       that closes CC #108/#109/#112 on existing boxes without re-embedding index)
#   D7  Heartbeat furnace protection     ensure-heartbeat-defaults
#   D8  Operator account separation      configure-operator-telegram
#   D9  No hardcoded wrong launchd label (no com.openclaw.gateway)
#   D10 WIRING-ASSERT present on update path

name: both-paths-delivery-guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  both-paths-delivery:
    name: Both-paths delivery dimensions (static source)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: D1 — provision_persona_index on install path
        run: |
          if ! grep -q 'provision_persona_index' install.sh; then
            echo "FAIL D1-install: provision_persona_index not found in install.sh"
            exit 1
          fi
          echo "PASS D1-install: provision_persona_index present in install.sh"

      - name: D1 — provision_persona_index on update path
        run: |
          if ! grep -q 'provision_persona_index' update-skills.sh; then
            echo "FAIL D1-update: provision_persona_index not found in update-skills.sh"
            exit 1
          fi
          echo "PASS D1-update: provision_persona_index present in update-skills.sh"

      - name: D2 — wire_ghl_funnel_catalog on install path
        run: |
          if ! grep -q 'wire_ghl_funnel_catalog' install.sh; then
            echo "FAIL D2-install: wire_ghl_funnel_catalog not found in install.sh"
            exit 1
          fi
          echo "PASS D2-install: wire_ghl_funnel_catalog present in install.sh"

      - name: D2 — wire_ghl_funnel_catalog on update path
        run: |
          if ! grep -q 'wire_ghl_funnel_catalog' update-skills.sh; then
            echo "FAIL D2-update: wire_ghl_funnel_catalog not found in update-skills.sh"
            exit 1
          fi
          echo "PASS D2-update: wire_ghl_funnel_catalog present in update-skills.sh"

      - name: D3 — materialize-dept-agents on install path
        run: |
          if ! grep -q 'materialize-dept-agents' install.sh; then
            echo "FAIL D3-install: materialize-dept-agents not found in install.sh"
            exit 1
          fi
          echo "PASS D3-install: materialize-dept-agents present in install.sh"

      - name: D3 — materialize-dept-agents on update path
        run: |
          if ! grep -q 'materialize-dept-agents' update-skills.sh; then
            echo "FAIL D3-update: materialize-dept-agents not found in update-skills.sh"
            exit 1
          fi
          echo "PASS D3-update: materialize-dept-agents present in update-skills.sh"

      - name: D4 — routing-fix script invoked on install path
        run: |
          # agentToAgent/allowAgents/visibility are NOT embedded verbatim in install.sh.
          # They are applied at runtime by apply-routing-fix.sh, which IS called from
          # install.sh. This check verifies the invocation is present.
          if ! grep -q 'apply-routing-fix' install.sh; then
            echo "FAIL D4-install: apply-routing-fix not invoked in install.sh"
            exit 1
          fi
          echo "PASS D4-install: apply-routing-fix invocation present in install.sh"

      - name: D4 — routing-fix script invoked on update path
        run: |
          # apply-routing-fix.sh carries agentToAgent/allowAgents/visibility for the
          # update path as well. Verify it is invoked.
          if ! grep -q 'apply-routing-fix' update-skills.sh; then
            echo "FAIL D4-update: apply-routing-fix not invoked in update-skills.sh"
            exit 1
          fi
          echo "PASS D4-update: apply-routing-fix invocation present in update-skills.sh"

      - name: D5 — run-full-install.sh deployed on install path (CC web-app)
        run: |
          # install.sh Step 15b copies run-full-install.sh to the skills dir.
          # The Skill-37 closeout agent also invokes it directly for fresh installs.
          # This check verifies the script is referenced (deployed) in install.sh.
          if ! grep -q 'run-full-install' install.sh; then
            echo "FAIL D5-install: run-full-install.sh not referenced in install.sh (CC #108/#109/#112 delivery missing on fresh-install path)"
            exit 1
          fi
          echo "PASS D5-install: run-full-install.sh referenced in install.sh"

      - name: D5 — run-full-install.sh invoked on update path (CC web-app refresh)
        run: |
          # update-skills.sh must invoke run-full-install.sh --update-only after the
          # materialize block so existing boxes get the CC #108/#109/#112 fixes.
          if ! grep -q 'run-full-install' update-skills.sh; then
            echo "FAIL D5-update: run-full-install.sh not invoked in update-skills.sh (CC #108/#109/#112 delivery gap — existing boxes keep stale dashboard)"
            exit 1
          fi
          echo "PASS D5-update: run-full-install.sh invoked in update-skills.sh"

      - name: D7 — heartbeat furnace protection on update path
        run: |
          if ! grep -q 'ensure-heartbeat-defaults\|ensure_heartbeat_defaults' update-skills.sh; then
            echo "FAIL D7-update: ensure-heartbeat-defaults not found in update-skills.sh"
            exit 1
          fi
          echo "PASS D7-update: ensure-heartbeat-defaults present in update-skills.sh"

      - name: D8 — operator account separation on update path
        run: |
          if ! grep -q 'configure-operator-telegram\|configure_operator_telegram' update-skills.sh; then
            echo "FAIL D8-update: configure-operator-telegram not found in update-skills.sh"
            exit 1
          fi
          echo "PASS D8-update: configure-operator-telegram present in update-skills.sh"

      - name: D9 — no hardcoded com.openclaw.gateway label
        run: |
          # Allow the string in CHANGELOG.md and docs only — not in scripts
          HITS=$(grep -rn 'com\.openclaw\.gateway' install.sh update-skills.sh scripts/ || true)
          if [ -n "$HITS" ]; then
            echo "FAIL D9: com.openclaw.gateway found in scripts (must be ai.openclaw.gateway or GW_LABEL):"
            echo "$HITS"
            exit 1
          fi
          echo "PASS D9: no hardcoded com.openclaw.gateway in install.sh, update-skills.sh, or scripts/"

      - name: D10 — WIRING-ASSERT present on update path
        run: |
          if ! grep -q 'WIRING-ASSERT' update-skills.sh; then
            echo "FAIL D10-update: WIRING-ASSERT block not found in update-skills.sh"
            exit 1
          fi
          echo "PASS D10-update: WIRING-ASSERT present in update-skills.sh"

      - name: D11 — persona reconcile wired on both paths (categories + 54 blueprints)
        run: |
          # v14.27.2: reconcile_persona_assets must run on BOTH paths so drifted
          # boxes (40/54 personas, non-canonical persona-categories.json) converge.
          if ! grep -q 'reconcile_persona_assets' install.sh; then
            echo "FAIL D11-install: reconcile_persona_assets not invoked in install.sh"
            exit 1
          fi
          if ! grep -q 'reconcile_persona_assets' update-skills.sh; then
            echo "FAIL D11-update: reconcile_persona_assets not invoked in update-skills.sh"
            exit 1
          fi
          echo "PASS D11: reconcile_persona_assets invoked on both paths"

      - name: D12 — provision idempotency gate is chunk_count + persona-dir aware (static)
        run: |
          # v14.27.2: the gate must NOT skip merely on "has section_number column".
          # It must compare chunk_count against the manifest and the persona-dir
          # count, so a non-canonical 6260/7615/9456-row partial index re-provisions.
          H="shared-utils/provision-persona-index.sh"
          MISS=""
          grep -q 'chunk_count != manifest chunk_count' "$H" || MISS="$MISS chunk_count-gate-doc"
          grep -q 'CONTENT_CANON\|CONTENT-CANONICAL' "$H" || MISS="$MISS content-canonical"
          grep -q 'PROVISION_DRY_RUN' "$H" || MISS="$MISS dry-run-hook"
          grep -q '_PERSONA_DIR_COUNT' "$H" || MISS="$MISS persona-dir-gate"
          if [ -n "$MISS" ]; then
            echo "FAIL D12: provision-persona-index.sh missing:$MISS"
            exit 1
          fi
          echo "PASS D12: provision gate is chunk_count + persona-dir aware with dry-run hook"

      - name: D13 — provision idempotency dynamic proof (offline, dry-run)
        run: |
          # Runs the dedicated acceptance test: a 6260-row index re-provisions while
          # the canonical 4413 is skipped; operator empty-sentinel self-heals; the
          # 40→54 reconcile converges. Fully offline (PROVISION_DRY_RUN=1).
          chmod +x tests/unit/provision-idempotency.test.sh
          bash tests/unit/provision-idempotency.test.sh

      - name: D14 — W7 platform-facts block present in apply-fleet-standards.sh
        run: |
          # v14.28.0: apply-fleet-standards.sh must contain the PLATFORM_FACTS_V1 block
          # so the W7 per-box AGENTS.md stamp is delivered on every install + update.
          # apply-fleet-standards.sh is called from both paths; this dimension confirms
          # the feature was not accidentally removed from the script.
          H="scripts/apply-fleet-standards.sh"
          if ! grep -qF 'PLATFORM_FACTS_V1' "$H"; then
            echo "FAIL D14: PLATFORM_FACTS_V1 marker not found in $H (W7 platform-facts stripped)"
            exit 1
          fi
          echo "PASS D14: PLATFORM_FACTS_V1 present in scripts/apply-fleet-standards.sh"

      - name: Summary
        if: always()
        run: |
          echo "Both-paths delivery guard complete."
          echo "D1-D5 (both paths) + D7-D14 checked across install.sh and update-skills.sh."
          echo "D4 checks apply-routing-fix invocation (routing keys applied at runtime, not verbatim)."
          echo "D5 checks run-full-install deployment (CC web-app refresh — CC #108/#109/#112)."
          echo "D11-D13 check the v14.27.2 persona reconcile + canonical idempotency gate."
          echo "D14 checks W7 platform-facts block present in apply-fleet-standards.sh (v14.28.0)."
          echo "All PASS = both paths deliver every dimension; any FAIL = regression detected."
