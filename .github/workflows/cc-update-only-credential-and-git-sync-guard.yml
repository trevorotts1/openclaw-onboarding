name: CC update-only credential + git-sync guard

# D6+D7 — fails the build if the Skill-32 Command Center installer
# (32-command-center-setup/scripts/run-full-install.sh) ever regresses on
# either of two proven defects:
#
#   D6 — a code-only --update-only roll must NEVER write
#        $OC_ROOT/secrets/.env (the store scripts/fleet-roll/
#        preflight-credential-guard.sh fingerprints). cc_write_env_local()'s
#        call to cc_mirror_api_auth_to_agent_secrets() is gated on
#        UPDATE_ONLY; only a full install may provision that store.
#   D7 — the CC git-refresh call sites must sync a DETACHED-HEAD checkout
#        (a client CC pinned to a version tag) instead of silently
#        no-opping like a bare `git pull --ff-only` does. cc_git_sync_to_
#        default_branch() re-attaches (checkout -B) or fast-forwards
#        (merge --ff-only), never destructively.
#
# scripts/test-cc-update-only-credential-and-git-sync.sh extracts both fixed
# functions VERBATIM (function-name-anchored awk — no reimplementation) from
# the real installer and exercises them against sandboxed HOMEs and a real
# local git remote (no network, no gateway, no real credentials).
#
# Security note: consumes only repo file content (no untrusted GitHub event
# fields like PR title/body/commit message), so there is no injection surface.

on:
  push:
    branches: [main]
    paths:
      - "32-command-center-setup/scripts/run-full-install.sh"
      - "scripts/fleet-roll/preflight-credential-guard.sh"
      - "scripts/test-cc-update-only-credential-and-git-sync.sh"
      - ".github/workflows/cc-update-only-credential-and-git-sync-guard.yml"
  pull_request:
    branches: [main]
    paths:
      - "32-command-center-setup/scripts/run-full-install.sh"
      - "scripts/fleet-roll/preflight-credential-guard.sh"
      - "scripts/test-cc-update-only-credential-and-git-sync.sh"
      - ".github/workflows/cc-update-only-credential-and-git-sync-guard.yml"

jobs:
  cc-update-only-credential-and-git-sync-guard:
    name: --update-only never mutates secrets/.env; detached-HEAD CC checkout still syncs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure git identity (needed for local test-fixture commits)
        run: |
          git config --global user.email "ci@example.test"
          git config --global user.name "CI"

      - name: Run D6+D7 regression test suite
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/test-cc-update-only-credential-and-git-sync.sh
          echo "cc-update-only-credential-and-git-sync-guard: PASS"
