name: fail-closed guards (T1-02 / T0-06 / T1-03)

# THREE DEFECTS THIS LOCKS. All three are fail-open: a check ran, found the thing
# it exists to find, and let the run pass anyway.
#
# T1-02 (45-design-intelligence-library/qc-design-intelligence-library.sh:116-122)
#   Client identity material detected inside the library printed a WARNING with no
#   exit and no failure flag, and the run then reached the unconditional banner
#   "All checks passed / Ready for installation on boxes". This gate exists
#   specifically to stop one client's identity material from shipping into a
#   library that installs on every other client's box.
#
#   SCOPING — the fix keys off COMMITTEDNESS, not directory location. A location
#   test cannot separate the repository from an installed box: measured read-only
#   on 2026-07-21, 6 of 30 reachable boxes run this skill from a git clone of this
#   repository rooted at <home>/.openclaw/skills, with the QC script itself tracked
#   in that clone. A tracked path ships fleet-wide; a box-authored, untracked card
#   goes nowhere and must still pass.
#
# T0-06 (same script, :188-189)
#   An unavailable python3 was a SKIP, so the gate reported success having
#   exercised none of the coded gates — including the consent gate that refuses a
#   minor's identity material. Now a hard failure, and python3 is declared a
#   required prerequisite in PREREQS.json. Withholding was considered and was not
#   necessary: python3 measured present on 30 of 30 reachable boxes (6 unreachable
#   and recorded as unmeasured).
#
# T1-03 (eight documented verification steps across five skills)
#   Steps that printed credential characters — "first ten characters", an
#   eight-character prefix, a grep of a secrets file — now report SET or NOT-SET
#   only. These steps run inside agent sessions, and transcripts, agent logs and
#   shell history retain everything emitted.
#
# ANTI-FALSE-POSITIVE CONTROLS (a "fix" that just makes everything fail, or a test
# that asserts nothing, must not pass this workflow):
#   * an installed box holding its own client data still PASSES, including the
#     measured "installed from a clone of this repo" shape;
#   * the clean repository state still PASSES;
#   * a box WITH python3 still PASSES and its validator self-tests really execute;
#   * the credential test EXECUTES the shipped markdown rather than scanning for
#     variable names, and separately proves its own leak detector fires on the
#     pre-fix shapes and that its process-table sampler fires on a planted control.
#
# Hermetic: temp dirs, local git only, a stubbed `openclaw`, a synthetic sentinel
# credential. No network, no real credential, no fleet box is touched.

# TRIGGERS — deliberately NOT restricted to `branches: [main]`. Measured on this
# repository 2026-07-21: `pull_request` events do not fire here, so the 40
# workflows that gate on `branches: [main]` contribute nothing to a feature
# branch's checks. Every check that actually ran on PR #697 came from a
# branch-unfiltered `push` workflow. A guard that cannot run before the merge is
# not a guard, so this one follows the convention that demonstrably executes —
# the same one wave-list-integrity-guard.yml uses.
on:
  push:
    paths:
      - "45-design-intelligence-library/**"
      - "07-kie-setup/INSTALL.md"
      - "22-book-to-persona-coaching-leadership-system/SKILL.md"
      - "37-zhc-closeout/SKILL.md"
      - "05-ghl-setup/INSTALL.md"
      - "05-ghl-setup/EXAMPLES.md"
      - "05-ghl-setup/QC.md"
      - "tests/unit/design-library-gate-fails-closed.test.sh"
      - "tests/unit/credential-presence-only-docs.test.sh"
      - ".github/workflows/design-library-and-credential-disclosure-guards.yml"
  pull_request:
    paths:
      - "45-design-intelligence-library/**"
      - "07-kie-setup/INSTALL.md"
      - "22-book-to-persona-coaching-leadership-system/SKILL.md"
      - "37-zhc-closeout/SKILL.md"
      - "05-ghl-setup/INSTALL.md"
      - "05-ghl-setup/EXAMPLES.md"
      - "05-ghl-setup/QC.md"
      - "tests/unit/design-library-gate-fails-closed.test.sh"
      - "tests/unit/credential-presence-only-docs.test.sh"
      - ".github/workflows/design-library-and-credential-disclosure-guards.yml"

jobs:
  t1-02-t0-06:
    name: "T1-02/T0-06: the design-library gate fails closed"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # The "pre-fix gate really passed" step below derives the unfixed gate
          # via `git show <pinned-SHA>:...`. A shallow depth-1 checkout cannot see
          # that ancestor, so the full history is required here.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax-check the gate
        shell: bash
        run: |
          set -euo pipefail
          bash -n 45-design-intelligence-library/qc-design-intelligence-library.sh
          bash -n tests/unit/design-library-gate-fails-closed.test.sh
          python3 -c "import json,sys; json.load(open('45-design-intelligence-library/PREREQS.json'))"
          echo "OK: gate, test and prerequisite manifest parse"

      - name: The gate fails closed, and does not false-fail an installed box
        shell: bash
        run: |
          set -euo pipefail
          bash tests/unit/design-library-gate-fails-closed.test.sh

      - name: The pre-fix gate really passed the same fixtures
        # The 2.1 law: a test that cannot fail against the pre-fix tree proves
        # nothing. The pre-fix gate is derived from the PINNED last-blind commit
        # 391a92e9a9ae5fcbc8d583853b2f286c3b32bae8 (v20.0.85, the merge this fix
        # branched from), never a moving ref — a moving ref reads the FIXED gate
        # once this merges and then fails permanently.
        env:
          PRE_FIX_SHA: 391a92e9a9ae5fcbc8d583853b2f286c3b32bae8
        shell: bash
        run: |
          set -euo pipefail
          PRE="$(mktemp -d)"
          git show "${PRE_FIX_SHA}:45-design-intelligence-library/qc-design-intelligence-library.sh" > "$PRE/gate.sh"
          work="$(mktemp -d)"
          cp -R 45-design-intelligence-library/. "$work/"
          rm -rf "$work/.git"
          cp "$PRE/gate.sh" "$work/qc-design-intelligence-library.sh"
          # Plant committed client data — synthetic, no real client name.
          printf '# SI-999 synthetic fixture style card\n' > "$work/library/single-image-designs/SI-999_synthetic-fixture.md"
          mkdir -p "$work/library/personal-photo-shoot/synthetic-fixture-identity"
          printf '# IDENTITY — synthetic fixture\n' > "$work/library/personal-photo-shoot/synthetic-fixture-identity/IDENTITY.md"
          git -C "$work" init -q
          git -C "$work" config user.email fixture@localhost
          git -C "$work" config user.name fixture
          git -C "$work" add -A
          git -C "$work" commit -q -m fixture
          set +e
          out="$(cd "$work" && bash qc-design-intelligence-library.sh 2>&1)"; rc=$?
          set -e
          if [ $rc -eq 0 ]; then
            echo "OK: the pre-fix gate exited 0 with committed client data — the defect is real and the new test is capable of catching it"
          else
            echo "FAIL: the pre-fix gate already failed (rc=$rc); the new test proves nothing"
            printf '%s\n' "$out"
            exit 1
          fi

  t1-03:
    name: "T1-03: credential checks report presence, never a value"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax-check the test
        shell: bash
        run: |
          set -euo pipefail
          bash -n tests/unit/credential-presence-only-docs.test.sh
          echo "OK: test parses"

      - name: Every documented credential check is presence-only
        shell: bash
        run: |
          set -euo pipefail
          bash tests/unit/credential-presence-only-docs.test.sh
