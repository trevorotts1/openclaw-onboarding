name: embedding-integrity-guard

# Embedding-subsystem hardening gates (see docs/EMBEDDINGS.md):
#
#   Job 1 (hard-gate): runs tests/unit/embedding-hard-gate.test.sh —
#     - a keyless index run must FAIL LOUD (never silently write fake
#       768-dim vectors, never stamp lying gemini/3072 metadata)
#     - fake mode is explicit-only (--allow-fake-embeddings + --db) and
#       truthfully stamped provider='fake'
#     - embedding_engine --verify fails rc=4 on fake or lying-stamp rows
#     - the sandbox write-guard blocks default-live-DB writes under an
#       overridden $HOME without OPENCLAW_SANDBOX=1
#     - detect_platform gemini_index == embedding_engine.DB_PATH (one DB path)
#
#   Job 2 (universal-sops): scripts/hash-universal-sops-manifest.py --check —
#     any edit under universal-sops/ without a manifest re-stamp fails.
#
#   Job 3 (sop-embed-once, P4-03): the CC SOP/routing embed-once pipeline
#     (Corpus 5) — HASH-SKIP + real-vector hard gate for
#     shared-utils/sop-embed-once/embed_sop_library.py, the client-box
#     provisioning idempotency gate (sha256 hard gate, model/dims mismatch
#     refusal, marker-table stamping) for provision_sop_embeddings.py, and the
#     dual-health-surface reconciliation regression test proving a box with
#     SOP content loaded but zero sop_embeddings rows can no longer
#     false-pass embedding_health.py::check_cc_sop_index while the heartbeat
#     probe correctly reports it dark.
#
# All jobs are offline (no embedding API calls, no downloads).

on:
  push:
    paths:
      - shared-utils/embedding_engine.py
      - shared-utils/detect_platform.py
      - shared-utils/semantic_task_fit.py
      - shared-utils/embedding_health.py
      - shared-utils/persona_embedding_drift_probe.py
      - shared-utils/fleet_refresh_runner.py
      - shared-utils/prebuilt-index/**
      - 23-ai-workforce-blueprint/scripts/gemini-section-indexer.py
      - 23-ai-workforce-blueprint/lib/detect_platform.py
      - 22-book-to-persona-coaching-leadership-system/pipeline/orchestrator.py
      - 22-book-to-persona-coaching-leadership-system/pipeline/persona_fleet.py
      - 22-book-to-persona-coaching-leadership-system/pipeline/publish-personas-to-fleet.sh
      - universal-sops/**
      - scripts/hash-universal-sops-manifest.py
      - tests/unit/embedding-hard-gate.test.sh
      - tests/unit/pipeline-provider-routing.test.sh
      - tests/unit/storm-guard.test.sh
      - tests/unit/orphan-process-prevention.test.sh
      - tests/unit/embedding-credential-error-classify.test.py
      - tests/unit/orchestrator-embed-fail-exit8.test.py
      - tests/unit/orchestrator-phase5-deferred-receipt.test.py
      - tests/unit/persona-fleet-index-verify.test.py
      - tests/unit/persona-embedding-drift-probe.test.py
      - tests/unit/publish-personas-to-fleet.test.sh
      - 22-book-to-persona-coaching-leadership-system/pipeline/orphan_guard.py
      - 22-book-to-persona-coaching-leadership-system/pipeline/run-orchestrator.sh
      - 22-book-to-persona-coaching-leadership-system/pipeline/reap-orchestrators.sh
      - shared-utils/sop-embed-once/**
      - 32-command-center-setup/scripts/ingest-sop-library.sh
      - 32-command-center-setup/HEARTBEAT.md
      - tests/unit/sop-embed-once-hash-skip.test.py
      - tests/unit/provision-sop-embeddings-idempotency.test.py
      - tests/unit/embedding-health-cc-sop-reconciliation.test.py
      - shared-utils/sop-library/**
      - update-skills.sh
      - tests/unit/sop-library-coverage-gate.test.py
      - tests/unit/sop-library-update-path-ingest.test.sh
      - .github/workflows/embedding-integrity-guard.yml
  pull_request:
    paths:
      - shared-utils/embedding_engine.py
      - shared-utils/detect_platform.py
      - shared-utils/semantic_task_fit.py
      - shared-utils/embedding_health.py
      - shared-utils/persona_embedding_drift_probe.py
      - shared-utils/fleet_refresh_runner.py
      - shared-utils/prebuilt-index/**
      - 23-ai-workforce-blueprint/scripts/gemini-section-indexer.py
      - 23-ai-workforce-blueprint/lib/detect_platform.py
      - 22-book-to-persona-coaching-leadership-system/pipeline/orchestrator.py
      - 22-book-to-persona-coaching-leadership-system/pipeline/persona_fleet.py
      - 22-book-to-persona-coaching-leadership-system/pipeline/publish-personas-to-fleet.sh
      - universal-sops/**
      - scripts/hash-universal-sops-manifest.py
      - tests/unit/embedding-hard-gate.test.sh
      - tests/unit/pipeline-provider-routing.test.sh
      - tests/unit/storm-guard.test.sh
      - tests/unit/orphan-process-prevention.test.sh
      - tests/unit/embedding-credential-error-classify.test.py
      - tests/unit/orchestrator-embed-fail-exit8.test.py
      - tests/unit/orchestrator-phase5-deferred-receipt.test.py
      - tests/unit/persona-fleet-index-verify.test.py
      - tests/unit/persona-embedding-drift-probe.test.py
      - tests/unit/publish-personas-to-fleet.test.sh
      - 22-book-to-persona-coaching-leadership-system/pipeline/orphan_guard.py
      - 22-book-to-persona-coaching-leadership-system/pipeline/run-orchestrator.sh
      - 22-book-to-persona-coaching-leadership-system/pipeline/reap-orchestrators.sh
      - shared-utils/sop-embed-once/**
      - 32-command-center-setup/scripts/ingest-sop-library.sh
      - 32-command-center-setup/HEARTBEAT.md
      - tests/unit/sop-embed-once-hash-skip.test.py
      - tests/unit/provision-sop-embeddings-idempotency.test.py
      - tests/unit/embedding-health-cc-sop-reconciliation.test.py
      - shared-utils/sop-library/**
      - update-skills.sh
      - tests/unit/sop-library-coverage-gate.test.py
      - tests/unit/sop-library-update-path-ingest.test.sh
      - .github/workflows/embedding-integrity-guard.yml
  workflow_dispatch:

jobs:
  hard-gate:
    name: "Embedding hard gates (fake-768 / sandbox / one-DB-path)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run embedding-hard-gate tests
        run: |
          chmod +x tests/unit/embedding-hard-gate.test.sh
          bash tests/unit/embedding-hard-gate.test.sh

      - name: Section-tagger / indexer agreement (existing invariant)
        run: |
          chmod +x tests/unit/section-tagger-indexer-agreement.test.sh
          bash tests/unit/section-tagger-indexer-agreement.test.sh

      - name: Book-pipeline provider routing (task-64 bugs 3/4/5 + 1/2 regression)
        run: |
          chmod +x tests/unit/pipeline-provider-routing.test.sh
          bash tests/unit/pipeline-provider-routing.test.sh

      - name: Structural storm guards (fail-fast / preflight / circuit-breaker / budget)
        run: |
          chmod +x tests/unit/storm-guard.test.sh
          bash tests/unit/storm-guard.test.sh

      - name: Orphan-process prevention (parent-liveness / group-reap / targeted-reaper / slug-lock)
        run: |
          chmod +x tests/unit/orphan-process-prevention.test.sh
          bash tests/unit/orphan-process-prevention.test.sh

  persona-embeddings-wiring:
    name: "A-U8 — book-to-persona embeddings wiring (index write / deferral / index-verify / drift)"
    runs-on: ubuntu-latest
    # The runner is a bare box: no ~/.openclaw (Mac marker) and no
    # /data/.openclaw or /data/clawd (VPS markers) on disk, so
    # get_openclaw_paths() (shared-utils/detect_platform.py,
    # 23-ai-workforce-blueprint/lib/detect_platform.py) cannot resolve a
    # platform and raises SystemExit("Cannot detect OpenClaw platform.").
    # tests/unit/embedding-credential-error-classify.test.py's
    # TestIndexerExitCodeRouting cases load 23-ai-workforce-blueprint/scripts/
    # gemini-section-indexer.py's main(), which calls get_openclaw_paths()
    # before reaching the credential-vs-generic exit-code branch under test,
    # so both cases die on SystemExit(1) instead of asserting exit 4 / exit 6.
    # OPENCLAW_PLATFORM is the same first-class override install.sh /
    # update-skills.sh / lib-shared.sh already honor, and the same escape
    # hatch qc-static.yml already uses for this exact bare-runner gap; setting
    # it makes detection deterministic for the WHOLE job WITHOUT weakening
    # real Mac/VPS detection (the override is only consulted when set, so a
    # real box still auto-detects exactly as before). This job never touches
    # a live install — it exercises the indexer/orchestrator/publish code
    # against fixture dirs — so a forced platform is correct here.
    env:
      OPENCLAW_PLATFORM: mac
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Credential-error classification (is_credential_error, exit 4 vs 6)
        run: python3 tests/unit/embedding-credential-error-classify.test.py -v

      - name: Orchestrator Phase-5 EMBED_FAILED exit-8 gate (regression, extended with DEFERRED)
        run: python3 tests/unit/orchestrator-embed-fail-exit8.test.py -v

      - name: Orchestrator Phase-5 classify + deferred receipt (keyless real-subprocess end-to-end)
        run: python3 tests/unit/orchestrator-phase5-deferred-receipt.test.py -v

      - name: persona_fleet.py index-verify (indexed OR honestly deferred, exit 7 on gap)
        run: python3 tests/unit/persona-fleet-index-verify.test.py -v

      - name: persona_embedding_drift_probe (one operator card per run, fleet_refresh_runner wiring)
        run: python3 tests/unit/persona-embedding-drift-probe.test.py -v

      - name: publish-personas-to-fleet.sh end-to-end (triad + index-verify gate + rollback)
        run: |
          chmod +x tests/unit/publish-personas-to-fleet.test.sh
          bash tests/unit/publish-personas-to-fleet.test.sh

  universal-sops:
    name: "universal-sops content manifest"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check universal-sops content manifest
        run: python3 scripts/hash-universal-sops-manifest.py --check

  sop-embed-once:
    name: "P4-03 — CC SOP-embeddings embed-once pipeline (Corpus 5)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: SOP embed-once — HASH-SKIP + real-vector hard gate
        run: python3 tests/unit/sop-embed-once-hash-skip.test.py -v

      - name: SOP-embeddings client-box provisioning — idempotency + sha256/model-mix refusal
        run: python3 tests/unit/provision-sop-embeddings-idempotency.test.py -v

      - name: CC SOP embedding-health — dual-surface reconciliation (dark-box no longer false-passes)
        run: python3 tests/unit/embedding-health-cc-sop-reconciliation.test.py -v

      # SOP CONTENT population (distinct from the embeddings pipeline above).
      # The updater synced FILES but never populated the SOP DATABASE, so a box
      # could report a green "update complete" while holding a 24-row demo
      # fixture against a 2555-row canonical library -- and embedding_health.py
      # called that `pass` because every leg it had tested consistency, not
      # coverage. These two gates keep both halves closed.
      - name: SOP library — coverage gate (an under-populated `sops` table can no longer report pass)
        run: python3 tests/unit/sop-library-coverage-gate.test.py -v

      - name: SOP library — update-path ingestion (idempotent, non-clobbering, fails loud; offline)
        run: |
          chmod +x tests/unit/sop-library-update-path-ingest.test.sh
          bash tests/unit/sop-library-update-path-ingest.test.sh
