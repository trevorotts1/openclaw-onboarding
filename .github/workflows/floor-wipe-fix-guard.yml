name: Floor-wipe fix guard (P2-06)

# P2-06 — THE FLOOR-WIPE FIX (verify + close residuals).
#
# ROOT CAUSE (already fixed, this unit is verify + residue): department-floor.py /
# build-workforce.py now fail CLOSED when department-naming-map.json is
# unreadable — the enforced floor stays the full 22 mandatory + 6
# universal-primary = 28, never a silent drop to 22. That closed the
# BUILD-TIME defect. It did nothing for a box that was BUILT before the fix
# landed and is still missing whole departments TODAY ("the wipe").
#
# CORRECTION (2026-07-21) — this header previously claimed the update-path
# floor-fill "only ever fills missing ROLES/SOPS inside a department that
# ALREADY EXISTS on disk — a department that is entirely absent was invisible
# to it (make-gap-from-staleness.py deliberately drops 'dept'-kind items)".
# That was FALSE and it hid a live fleet defect for three weeks. Dropping
# `kind: "dept"` items never mattered: an absent department is reconstructed
# implicitly from its own `kind: "role"` MISSING items (keyed "<dept>/<slug>"),
# and floor-fill-driver.py mkdir's the department for them. Because the
# detect-stale verdict is derived ONLY from templates/role-library/_index.json —
# which ships EVERY department, industry-gated ones included, and has no
# vertical-pack concept — the update path re-created the industry-gated
# real-estate `listings` department on every box on every update, on boxes
# running the POST-demotion naming map, and on a box whose owner had explicitly
# declined the vertical set. floor-fill-driver.py now consults
# vertical-derivation-guard.check_add() before creating an ABSENT department;
# test-floor-fill-vertical-gate.sh (suite 5 below) is the permanent lock.
#
# This gate runs the five suites this unit ships:
#
#   1. test-naming-map-corruption-fail-closed.sh — PERMANENT regression for
#      the (d)/(e) break-it requirement ("corrupt a test copy of the naming
#      map and prove the build refuses to go short"): department-floor.py's
#      evaluate_floor() still enforces the full 28-department floor when the
#      naming map is invalid JSON, missing entirely, or valid-but-empty —
#      NEVER silently shrinking to 22. The acceptance case (T2) is the exact
#      P2-06 defect: a corrupted map must not let a 22-only board pass.
#   2. test-materialize-missing-departments.sh — the NEW live remediation
#      (materialize-missing-departments.py): given a box department-floor.py
#      reports floor-short, it materializes ONLY the genuinely missing whole
#      departments with REAL role-library content (both the flat-.md and the
#      per-role-subdirectory library layouts — T5 is a fail-first regression
#      lock for the exact subdirectory-layout bug hit during this unit's own
#      development), additive-only (byte-identical pre-existing depts,
#      checksum-proven), idempotent, and honors client declines.
#   3. test-materialize-missing-departments-join.sh — the P2-06 (c)2 CLOSING
#      REQUIREMENT ("then prove-board-join.py must pass"): materializing
#      directories only closes LAYER 2 (provisioned); this proves the CHOSEN
#      artifact sync is append-only, DB discovery is EXPLICIT-SIGNAL ONLY
#      (never the ambient resolve_db.find_dashboard_db() candidate list — T0
#      is a fail-first regression lock for a real live-DB-touching incident
#      hit during this unit's own development), an explicit --db reaches a
#      genuine end-to-end JOIN OK independently re-verified via a fresh
#      prove-board-join.py invocation, --skip-join-verify bypasses both new
#      code paths, and — T5, the headline regression lock — a DRIFT/
#      CANNOT-VOUCH join verdict downgrades the overall exit code to 1 even
#      when the on-disk floor is fully met.
#   4. scripts/probe/test-p206-floor-short-probe.sh — the P6-01 per-box
#      detect verdict (ships now, runs against live fleet boxes only in the
#      final rollout phase per meta-rule 2.1/2.7): ARMED / DEGRADED /
#      UNRESOLVABLE are three DISTINCT exit codes (0/1/2), --remediate closes
#      a flagged box and RE-VERIFIES from the live tree rather than trusting
#      the remediator's own report, --json output is never corrupted by
#      a subprocess/import's own stdout, and (T6/T7) an explicit --db makes
#      the probe independently re-verify LAYER 3 (the displayed board) from
#      source after remediation — never trusting the remediator's own
#      embedded join_verification claim — so a DRIFT verdict downgrades
#      overall_armed and the probe's exit code even though the on-disk floor
#      is met.
#   5. test-floor-fill-vertical-gate.sh — the INDUSTRY GATE regression lock
#      (see the CORRECTION above). T1 is the fail-first reproduction: an
#      industry-gated department that is ABSENT from disk is no longer created
#      on a box whose build record declares no matching vertical, and the
#      refusal carries the guard's named VERTICAL_NOT_DECLARED error. T2-T7
#      pin the gate's scope so the fix can never become a floor regression:
#      a DECLARED box still gets the department, mandatory canonical depts and
#      universal-primary verticals are never gated, a department already on
#      disk is still filled and NEVER removed (removal is an owner decision,
#      not this tool's), a gated skip is rc 0 (a policy skip must not fail
#      every fleet update), and the driver hard-codes no department list of
#      its own — the naming map, via the guard, stays the single source. Its
#      invocation deliberately uses only flags the PRE-fix driver also
#      accepted, so the fail-before is a real behavioral difference and not an
#      argparse error.
#
# All five are hermetic: mktemp sandboxes, and no scenario can be judged
# against whatever real client build-state happens to exist on the box running
# the suite (verified live on the operator's own box, which carries real prior
# declines that would otherwise silently change the expected department set).
# Suites 1-4 pin --build-state-file to a neutral {} record for that; suite 5
# instead drops its own .workforce-build-state.json fixture beside its sandbox
# workspace, which is the FIRST candidate the industry gate's resolver reads —
# deliberately, so its command line stays identical to the pre-fix driver's and
# its fail-before is behavioral rather than an argparse error.
# No corrupted file is ever written to the real
# repo checkout — the naming-map corruption test monkeypatches the imported
# module's NAMING_MAP constant onto a private tmp copy; the regression-lock
# test injects its bug into a scratch copy placed and removed (trap) beside
# the real script, never into the file under test itself. python3 + shasum
# only — no jq, no network, no git.
#
# Runs on every push to main and on any PR that touches the files this unit
# ships or the tests that exercise them.

on:
  push:
    branches: [main]
    paths:
      - "23-ai-workforce-blueprint/scripts/department-floor.py"
      - "23-ai-workforce-blueprint/scripts/materialize-missing-departments.py"
      - "23-ai-workforce-blueprint/scripts/floor-fill-driver.py"
      - "23-ai-workforce-blueprint/scripts/vertical-derivation-guard.py"
      - "23-ai-workforce-blueprint/scripts/test-floor-fill-vertical-gate.sh"
      - "23-ai-workforce-blueprint/scripts/create_role_workspaces.py"
      - "23-ai-workforce-blueprint/scripts/test-materialize-missing-departments.sh"
      - "23-ai-workforce-blueprint/scripts/test-materialize-missing-departments-join.sh"
      - "23-ai-workforce-blueprint/scripts/test-naming-map-corruption-fail-closed.sh"
      - "23-ai-workforce-blueprint/scripts/prove-board-join.py"
      - "23-ai-workforce-blueprint/department-naming-map.json"
      - "23-ai-workforce-blueprint/templates/role-library/_index.json"
      - "32-command-center-setup/scripts/seed-workspaces.py"
      - "scripts/probe/p206-floor-short-probe.py"
      - "scripts/probe/test-p206-floor-short-probe.sh"
      - ".github/workflows/floor-wipe-fix-guard.yml"
  pull_request:
    branches: [main]
    paths:
      - "23-ai-workforce-blueprint/scripts/department-floor.py"
      - "23-ai-workforce-blueprint/scripts/materialize-missing-departments.py"
      - "23-ai-workforce-blueprint/scripts/floor-fill-driver.py"
      - "23-ai-workforce-blueprint/scripts/vertical-derivation-guard.py"
      - "23-ai-workforce-blueprint/scripts/test-floor-fill-vertical-gate.sh"
      - "23-ai-workforce-blueprint/scripts/create_role_workspaces.py"
      - "23-ai-workforce-blueprint/scripts/test-materialize-missing-departments.sh"
      - "23-ai-workforce-blueprint/scripts/test-materialize-missing-departments-join.sh"
      - "23-ai-workforce-blueprint/scripts/test-naming-map-corruption-fail-closed.sh"
      - "23-ai-workforce-blueprint/scripts/prove-board-join.py"
      - "23-ai-workforce-blueprint/department-naming-map.json"
      - "23-ai-workforce-blueprint/templates/role-library/_index.json"
      - "32-command-center-setup/scripts/seed-workspaces.py"
      - "scripts/probe/p206-floor-short-probe.py"
      - "scripts/probe/test-p206-floor-short-probe.sh"
      - ".github/workflows/floor-wipe-fix-guard.yml"

jobs:
  floor-wipe-fix-guard:
    name: P2-06 floor-wipe fix (5 hermetic suites)
    runs-on: ubuntu-latest
    env:
      OPENCLAW_PLATFORM: mac
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run the P2-06 suites (each exit 0 required)
        shell: bash
        run: |
          set -uo pipefail
          rc=0

          echo "======================================================================"
          echo "RUN: 23-ai-workforce-blueprint/scripts/test-naming-map-corruption-fail-closed.sh"
          echo "======================================================================"
          if bash 23-ai-workforce-blueprint/scripts/test-naming-map-corruption-fail-closed.sh; then
            echo "PASS: test-naming-map-corruption-fail-closed.sh"
          else
            echo "FAIL: test-naming-map-corruption-fail-closed.sh exited non-zero" >&2
            rc=1
          fi

          echo "======================================================================"
          echo "RUN: 23-ai-workforce-blueprint/scripts/test-materialize-missing-departments.sh"
          echo "======================================================================"
          if bash 23-ai-workforce-blueprint/scripts/test-materialize-missing-departments.sh; then
            echo "PASS: test-materialize-missing-departments.sh"
          else
            echo "FAIL: test-materialize-missing-departments.sh exited non-zero" >&2
            rc=1
          fi

          echo "======================================================================"
          echo "RUN: 23-ai-workforce-blueprint/scripts/test-materialize-missing-departments-join.sh"
          echo "======================================================================"
          if bash 23-ai-workforce-blueprint/scripts/test-materialize-missing-departments-join.sh; then
            echo "PASS: test-materialize-missing-departments-join.sh"
          else
            echo "FAIL: test-materialize-missing-departments-join.sh exited non-zero" >&2
            rc=1
          fi

          echo "======================================================================"
          echo "RUN: scripts/probe/test-p206-floor-short-probe.sh"
          echo "======================================================================"
          if bash scripts/probe/test-p206-floor-short-probe.sh; then
            echo "PASS: test-p206-floor-short-probe.sh"
          else
            echo "FAIL: test-p206-floor-short-probe.sh exited non-zero" >&2
            rc=1
          fi

          echo "======================================================================"
          echo "RUN: 23-ai-workforce-blueprint/scripts/test-floor-fill-vertical-gate.sh"
          echo "======================================================================"
          if bash 23-ai-workforce-blueprint/scripts/test-floor-fill-vertical-gate.sh; then
            echo "PASS: test-floor-fill-vertical-gate.sh"
          else
            echo "FAIL: test-floor-fill-vertical-gate.sh exited non-zero" >&2
            rc=1
          fi

          echo "======================================================================"
          if [ "$rc" -eq 0 ]; then
            echo "ALL 5 P2-06 FLOOR-WIPE-FIX SUITES PASSED"
          else
            echo "ONE OR MORE P2-06 FLOOR-WIPE-FIX SUITES FAILED" >&2
          fi
          exit "$rc"
