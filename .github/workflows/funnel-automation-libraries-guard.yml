name: funnel-automation-libraries-guard

# Protects the funnel + automation template libraries, their matchers, the funnel->automation
# link map, the persona crosswalk, and the standing FAB-QC build-quality gate (>= 8.5). Fails on:
#   - library drift (templates on disk out of sync with the committed indexes / link map),
#   - an unresolved template persona ref (the persona crosswalk drifted),
#   - a leaked operator-local path in a committed index,
#   - the FAB-QC gate or its fab-artifact producer being weakened or removed,
#   - a matcher / flex / fab_qc / fab_artifact / crosswalk regression (the pytest suites).

on:
  push:
    paths:
      - "06-ghl-install-pages/funnel-templates/**"
      - "06-ghl-install-pages/tools/funnel_matcher*.py"
      - "06-ghl-install-pages/tools/v2_dispatcher.py"
      - "06-ghl-install-pages/tools/persona_bundle_ladder.py"
      - "06-ghl-install-pages/tools/cc_board.py"
      - "06-ghl-install-pages/tools/catalog-index.json"
      - "06-ghl-install-pages/qc-built-funnel.sh"
      - "06-ghl-install-pages/tests/test_funnel_matcher.py"
      - "06-ghl-install-pages/tests/test_v2_dispatcher.py"
      - "06-ghl-install-pages/scripts/prove_skill6_block_u22.py"
      - "06-ghl-install-pages/tests/test_prove_skill6_block_u22.py"
      - "06-ghl-install-pages/tools/skill6_convergence.py"
      - "06-ghl-install-pages/tests/test_a_u7_convergence.py"
      - "06-ghl-install-pages/tests/test_a_u9_exemplar_injection.py"
      - "06-ghl-install-pages/exemplars/**"
      - "35-social-media-planner/exemplars/**"
      - "44-convert-and-flow-operator/automation-templates/**"
      - "44-convert-and-flow-operator/qc-built-workflow.sh"
      - "44-convert-and-flow-operator/tests/test_automation_matcher.py"
      - "49-signature-funnel/scripts/copy_persona_blend_seam.py"
      - "49-signature-funnel/scripts/test_copy_persona_blend_seam.py"
      - "shared-utils/fab_qc.py"
      - "shared-utils/fab_artifact.py"
      - "shared-utils/persona_crosswalk.py"
      - "shared-utils/persona-crosswalk.json"
      - "shared-utils/exemplar_injection.py"
      - "shared-utils/test_exemplar_injection.py"
      - "23-ai-workforce-blueprint/scripts/persona_blend.py"
      - "22-book-to-persona-coaching-leadership-system/persona-categories.json"
      - "universal-sops/funnel-automation-build-quality-rubric.md"
      - "tests/unit/fab-qc.test.py"
      - "tests/unit/fab-artifact.test.py"
      - "tests/unit/persona-crosswalk.test.py"
      - "scripts/check-funnel-automation-library-drift.py"
      - "scripts/guard-fab-qc-gate.sh"
      - ".github/workflows/funnel-automation-libraries-guard.yml"
  pull_request:
    paths:
      - "06-ghl-install-pages/funnel-templates/**"
      - "06-ghl-install-pages/tools/funnel_matcher*.py"
      - "06-ghl-install-pages/tools/v2_dispatcher.py"
      - "06-ghl-install-pages/tools/persona_bundle_ladder.py"
      - "06-ghl-install-pages/tools/cc_board.py"
      - "06-ghl-install-pages/tools/catalog-index.json"
      - "06-ghl-install-pages/qc-built-funnel.sh"
      - "06-ghl-install-pages/tests/test_funnel_matcher.py"
      - "06-ghl-install-pages/tests/test_v2_dispatcher.py"
      - "06-ghl-install-pages/scripts/prove_skill6_block_u22.py"
      - "06-ghl-install-pages/tests/test_prove_skill6_block_u22.py"
      - "06-ghl-install-pages/tools/skill6_convergence.py"
      - "06-ghl-install-pages/tests/test_a_u7_convergence.py"
      - "06-ghl-install-pages/tests/test_a_u9_exemplar_injection.py"
      - "06-ghl-install-pages/exemplars/**"
      - "35-social-media-planner/exemplars/**"
      - "44-convert-and-flow-operator/automation-templates/**"
      - "44-convert-and-flow-operator/qc-built-workflow.sh"
      - "44-convert-and-flow-operator/tests/test_automation_matcher.py"
      - "49-signature-funnel/scripts/copy_persona_blend_seam.py"
      - "49-signature-funnel/scripts/test_copy_persona_blend_seam.py"
      - "shared-utils/fab_qc.py"
      - "shared-utils/fab_artifact.py"
      - "shared-utils/persona_crosswalk.py"
      - "shared-utils/persona-crosswalk.json"
      - "shared-utils/exemplar_injection.py"
      - "shared-utils/test_exemplar_injection.py"
      - "23-ai-workforce-blueprint/scripts/persona_blend.py"
      - "22-book-to-persona-coaching-leadership-system/persona-categories.json"
      - "universal-sops/funnel-automation-build-quality-rubric.md"
      - "tests/unit/fab-qc.test.py"
      - "tests/unit/fab-artifact.test.py"
      - "tests/unit/persona-crosswalk.test.py"
      - "scripts/check-funnel-automation-library-drift.py"
      - "scripts/guard-fab-qc-gate.sh"
      - ".github/workflows/funnel-automation-libraries-guard.yml"

jobs:
  guard:
    name: Funnel/automation libraries + FAB-QC gate guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Library drift gate (disk <-> index <-> link map; persona crosswalk; portable indexes)
        run: python3 scripts/check-funnel-automation-library-drift.py

      - name: Persona crosswalk gate (0 unresolved persona refs; canonical targets)
        run: python3 shared-utils/persona_crosswalk.py --validate

      - name: FAB-QC gate guard (rubric + scorer + producer + crosswalk + call-sites)
        run: bash scripts/guard-fab-qc-gate.sh

      - name: Matcher selftests
        run: |
          python3 44-convert-and-flow-operator/automation-templates/_matcher/flex.py
          python3 44-convert-and-flow-operator/automation-templates/_matcher/cli.py --selftest
          python3 06-ghl-install-pages/tools/funnel_matcher_cli.py --selftest

      # U22/B-U8: these two selftests existed since U15/U17/U19 but were NEVER
      # wired into any CI job — a regression in the bundle-acquisition ladder
      # or the copy-stage blend seam could land on main undetected. Closes
      # that gap.
      - name: Persona-bundle ladder + copy-stage blend-seam selftests (B-U1/B-U3/B-U6)
        run: |
          python3 06-ghl-install-pages/tools/persona_bundle_ladder.py
          python3 49-signature-funnel/scripts/copy_persona_blend_seam.py --self-test

      - name: Matcher + FAB-QC + producer + crosswalk pytest suites
        run: |
          python3 -m pytest 06-ghl-install-pages/tests/test_funnel_matcher.py \
                            06-ghl-install-pages/tests/test_v2_dispatcher.py \
                            06-ghl-install-pages/tests/test_prove_skill6_block_u22.py \
                            06-ghl-install-pages/tests/test_a_u7_convergence.py \
                            06-ghl-install-pages/tests/test_a_u9_exemplar_injection.py \
                            44-convert-and-flow-operator/tests/test_automation_matcher.py \
                            49-signature-funnel/scripts/test_copy_persona_blend_seam.py -q
          python3 tests/unit/fab-qc.test.py
          python3 tests/unit/fab-artifact.test.py
          python3 tests/unit/persona-crosswalk.test.py

      # A-U9 (master unit U9): exemplar convention + write-time injection.
      # Module self-test (no network/key) + the unittest acceptance suite
      # (a)-(d) against the actually-shipped exemplar packs.
      - name: Exemplar-injection selftest + acceptance suite (A-U9)
        run: |
          python3 shared-utils/exemplar_injection.py
          python3 06-ghl-install-pages/tools/skill6_convergence.py
          python3 -m pytest shared-utils/test_exemplar_injection.py -q

      # U22/B-U8 acceptance (b)+(c): the ONE end-to-end operator-box fixture
      # proof run for the whole unification block (also exercised via pytest
      # above; run standalone too so its own exit code + printed checklist is
      # a first-class, independently-readable CI signal).
      - name: U22/B-U8 — Skill-6 persona-unification block operator-box proof run
        run: python3 06-ghl-install-pages/scripts/prove_skill6_block_u22.py
