name: gws credential-preservation guard

# v16.1.9 — fails the build if the fleet update/install/verify path could touch a
# client's Google Workspace credential store. PROVEN root cause of the v16.1.x
# wipe: the repo ships exactly ONE runtime gws call — `gws auth status` in
# 14-google-workspace-integration/qc-google-workspace-integration.sh. The
# onboarding verification gate (lib-onboarding-state.sh oc_gate_skill) runs that
# QC HEADLESS (`bash qc-*.sh >/dev/null 2>&1`, no TTY), driven by the
# watchdog/resume crons and the update path over skill 14. With no TTY gws cannot
# decrypt its file keyring, so gws's OWN failure mode rewrites
# ~/.config/gws/credentials.enc to credential_source:"none" — erasing the OAuth.
#
# scripts/test-gws-credential-preservation.sh seeds a sandbox HOME with fake
# credentials + a file-keyring key + gws-acct* stores + secrets/.env, puts a fake
# `gws` that faithfully models the headless self-clearing on PATH, then runs the
# REAL repo QC and the REAL oc_gate_skill gate headless and asserts every store
# survives BYTE-IDENTICAL with credential_source still valid, and that the bare
# probe is never fired. It also asserts the static invariants (single guarded
# call site, keyring-backend pin not dropped, no rm/mv/chmod/chown/overwrite of
# ~/.config/gws*, no gws remove/logout/revoke/delete). It is self-contained
# (bash + stdlib python3) so it runs with NO gateway and NO real gws installed.
#
# Security note: consumes only repo file content (no untrusted GitHub event
# fields like PR title/body/commit message), so there is no injection surface.

on:
  push:
    branches: [main]
    paths:
      - "14-google-workspace-integration/qc-google-workspace-integration.sh"
      - "lib-onboarding-state.sh"
      - "scripts/test-gws-credential-preservation.sh"
      - "install.sh"
      - "update-skills.sh"
      - "scripts/update-skills.sh"
      - "scripts/watchdog-onboarding-loop.sh"
      - "scripts/resume-onboarding.sh"
      - "scripts/harden-gws-credential-resilience.sh"
      - ".github/workflows/gws-credential-preservation-guard.yml"
  pull_request:
    branches: [main]
    paths:
      - "14-google-workspace-integration/qc-google-workspace-integration.sh"
      - "lib-onboarding-state.sh"
      - "scripts/test-gws-credential-preservation.sh"
      - "install.sh"
      - "update-skills.sh"
      - "scripts/update-skills.sh"
      - "scripts/watchdog-onboarding-loop.sh"
      - "scripts/resume-onboarding.sh"
      - "scripts/harden-gws-credential-resilience.sh"
      - ".github/workflows/gws-credential-preservation-guard.yml"

jobs:
  gws-credential-preservation-guard:
    name: update/verify path cannot wipe ~/.config/gws* or secrets/.env
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run gws credential-preservation regression test
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/test-gws-credential-preservation.sh
          echo "gws-credential-preservation-guard: PASS"
