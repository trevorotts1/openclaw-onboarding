name: presentation-intake-conversation-guard

# Fails the build if the Signature-Presentation (Skill 51) CLIENT INTAKE
# conversation regresses away from the "offer the quick-vs-in-depth CHOICE first,
# then ask ONE question at a time" contract (Trevor's one-question-at-a-time
# ruling; AF-INTAKE-BATCH).
#
# It runs tests/unit/presentation-intake-conversation.test.sh, which asserts,
# across the Skill-51 intake artifacts (intake/sp-8-questions.json + SKILL.md):
#   1. the CHOICE (quick + in-depth) and the one-question-at-a-time rule are present,
#   2. AF-INTAKE-BATCH is named and the exact screenshot batch anti-pattern is
#      documented as banned,
#   3. the spec's structured conversation_contract declares choice_first +
#      one_question_per_message + af_on_violation == AF-INTAKE-BATCH, and no
#      artifact regresses to the old "delivered as ONE block" framing, and
#   4. the deterministic RECORD gate (prove_sp_intake.py --self-test) still passes
#      -- the record layer (record_committed_atomically / one_block; the machine
#      layer no longer teaches batching) still gates the atomic commit; only the
#      CONVERSATION doctrine is added.
#
# This is the INTAKE conversation ONLY. It does NOT touch the image-prompt floor,
# build_deck.py, run_signature_deck.py, or any build phase, and it does NOT
# inspect the SOP-locked PIPELINE-MANIFEST / MASTER-QC-AUTOFAIL-RULESET.

on:
  push:
    branches: [main]
    paths:
      - 51-signature-presentation/intake/sp-8-questions.json
      - 51-signature-presentation/SKILL.md
      - 51-signature-presentation/scripts/prove_sp_intake.py
      - tests/unit/presentation-intake-conversation.test.sh
      - .github/workflows/presentation-intake-conversation-guard.yml
  pull_request:
    branches: [main]
    paths:
      - 51-signature-presentation/intake/sp-8-questions.json
      - 51-signature-presentation/SKILL.md
      - 51-signature-presentation/scripts/prove_sp_intake.py
      - tests/unit/presentation-intake-conversation.test.sh
      - .github/workflows/presentation-intake-conversation-guard.yml

jobs:
  intake-conversation-guard:
    name: Choice-first / one-at-a-time intake contract (Skill 51)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Intake conversation contract guard
        shell: bash
        run: |
          chmod +x tests/unit/presentation-intake-conversation.test.sh
          bash tests/unit/presentation-intake-conversation.test.sh
