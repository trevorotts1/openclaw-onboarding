name: Presentations lockstep (sync_check)

# Wires sync_check.py into CI as required by H3 in the presentation department review.
# sync_check reconciles the Python renderer (build_deck.py), the MASTER ruleset
# Section-5 table, the PIPELINE-MANIFEST.json autofails/phases/roles, and the
# deployed role-library + sops file set. Any drift (STACK-AHEAD-OF-CODE or
# CODE-AHEAD-OF-STACK) exits 4 — failing this job and blocking the merge.
#
# Triggered on pushes to main and PRs touching any of the four presentation-layer
# inputs sync_check reads:
#   1. build_deck.py (the canonical renderer — changes checkers / AF citations)
#   2. PIPELINE-MANIFEST.json (the declared truth — phases / autofails / roles)
#   3. MASTER-QC-AUTOFAIL-RULESET.md (the Section-5 AF registry)
#   4. any presentations role-library .md or sops .md (role/SOP roster drift)
#
# This is the CI gate that makes the AF-BAKED / AF-PROMPT-FLOOR class of drift
# (C2 in the review) fail loud forever: once a code is in the ruleset it MUST
# also be in the manifest, or this job exits non-zero.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      # Canonical renderer — any checker add/rename/delete changes the lockstep
      - "23-ai-workforce-blueprint/templates/role-library/presentations/scripts/build_deck.py"
      # Process-gate unit tests — run alongside sync_check so a gate regression fails CI
      - "23-ai-workforce-blueprint/templates/role-library/presentations/scripts/test_preflight.py"
      # Manifest (phases / autofails / roles / deliverables_required)
      - "universal-sops/presentation-slide-craft/PIPELINE-MANIFEST.json"
      # Section-5 AF registry — adding a row here without updating the manifest breaks sync
      - "universal-sops/presentation-slide-craft/MASTER-QC-AUTOFAIL-RULESET.md"
      # Presentation role-library files — adding/removing a role changes the roster
      - "23-ai-workforce-blueprint/templates/role-library/presentations/*.md"
      # Presentation SOP files — adding/removing an SOP changes the SOP file set
      - "23-ai-workforce-blueprint/templates/role-library/presentations/sops/*.md"
      # Universal-SOPs cluster also ships the manifest/ruleset (kept in sync with above)
      - "universal-sops/presentation-slide-craft/*.md"
      - "universal-sops/presentation-slide-craft/*.json"
      # Guard A — declared==enforced==tested gate-integrity check
      - "23-ai-workforce-blueprint/templates/role-library/presentations/scripts/gate_integrity_check.py"
      # Guard B — retired-doctrine residual lint + its pattern registry
      - "23-ai-workforce-blueprint/templates/role-library/presentations/scripts/doctrine_residual_check.py"
      - "23-ai-workforce-blueprint/templates/role-library/presentations/retired-doctrine-patterns.json"
      # Process-integrity layer (v16.1.11) — the runner + no-skip proof + substance
      # verifiers + producer/QC distinctness + CC board producer + the renderer pin.
      - "23-ai-workforce-blueprint/templates/role-library/presentations/scripts/run_signature_deck.py"
      - "23-ai-workforce-blueprint/templates/role-library/presentations/scripts/prove-deck.py"
      - "23-ai-workforce-blueprint/templates/role-library/presentations/scripts/phase_verifiers.py"
      - "23-ai-workforce-blueprint/templates/role-library/presentations/scripts/cc_board.py"
      - "23-ai-workforce-blueprint/templates/role-library/presentations/scripts/deck-intake-driver.py"
      - "23-ai-workforce-blueprint/templates/role-library/presentations/scripts/test_process_integrity.py"
      - "23-ai-workforce-blueprint/templates/role-library/presentations/scripts/CANONICAL-RENDERER-PIN.sha256"

jobs:
  presentations-lockstep:
    name: Presentations SOP/manifest/code lockstep (sync_check)
    runs-on: ubuntu-latest
    env:
      OPENCLAW_PLATFORM: mac
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install reportlab (required by presenters_speech_pdf.py import in sync env)
        shell: bash
        run: pip install reportlab --quiet

      - name: sync_check.py — presentations lockstep (exit 0 required)
        shell: bash
        run: |
          set -euo pipefail
          SYNC_CHECK="23-ai-workforce-blueprint/templates/role-library/presentations/scripts/sync_check.py"
          if [ ! -f "$SYNC_CHECK" ]; then
            echo "FATAL: sync_check.py not found at $SYNC_CHECK" >&2
            exit 2
          fi
          # Run sync_check and require exit 0.
          # Exit 4 = lockstep drift (AF code / checker / role / SOP mismatch).
          # Exit 2 = sync_check could not run (missing input — also a hard fail).
          python3 "$SYNC_CHECK"
          echo "sync_check: presentations lockstep PASSED — renderer, ruleset, manifest, roles, and SOPs are in sync."

      - name: test_preflight.py — process-gate unit tests (exit 0 required)
        shell: bash
        run: |
          set -euo pipefail
          TEST_PREFLIGHT="23-ai-workforce-blueprint/templates/role-library/presentations/scripts/test_preflight.py"
          if [ ! -f "$TEST_PREFLIGHT" ]; then
            echo "FATAL: test_preflight.py not found at $TEST_PREFLIGHT" >&2
            exit 2
          fi
          # The process-gate unit tests exercise every build_deck.py preflight/postflight
          # checker (research-cited, claims, coverage, rich-prompt, KIE-baked, bundle
          # completeness, teleprompter publish). Any regression in a gate exits non-zero
          # and blocks the merge. This step ALSO emits scripts/working/af-coverage.json
          # (every build_deck-enforced AF code a deliberately-failing fixture triggered),
          # which Guard A (gate_integrity_check.py) consumes in the next step.
          python3 "$TEST_PREFLIGHT"
          echo "test_preflight: all process-gate unit tests PASSED (af-coverage emitted)."

      - name: gate_integrity_check.py — Guard A (declared==enforced==tested, exit 0 required)
        shell: bash
        run: |
          set -euo pipefail
          GUARD_A="23-ai-workforce-blueprint/templates/role-library/presentations/scripts/gate_integrity_check.py"
          AF_COV="23-ai-workforce-blueprint/templates/role-library/presentations/scripts/working/af-coverage.json"
          if [ ! -f "$GUARD_A" ]; then
            echo "FATAL: gate_integrity_check.py not found at $GUARD_A" >&2
            exit 2
          fi
          if [ ! -f "$AF_COV" ]; then
            echo "FATAL: af-coverage.json not found at $AF_COV — the test_preflight step must run first to emit it." >&2
            exit 2
          fi
          # Guard A: every PIPELINE-MANIFEST autofail with enforced_by==build_deck must
          # have a referenced enforcing py_symbol AND a negative test that triggers it
          # (present in af-coverage). A declared-but-no-op or declared-but-untested gate
          # exits non-zero — this is what would have caught AF-QC-INDEPENDENCE as a no-op.
          python3 "$GUARD_A"
          echo "gate_integrity_check: Guard A PASSED — every build_deck-enforced gate is enforced AND tested."

      - name: doctrine_residual_check.py — Guard B (retired-doctrine residual lint, exit 0 required)
        shell: bash
        run: |
          set -euo pipefail
          GUARD_B="23-ai-workforce-blueprint/templates/role-library/presentations/scripts/doctrine_residual_check.py"
          if [ ! -f "$GUARD_B" ]; then
            echo "FATAL: doctrine_residual_check.py not found at $GUARD_B" >&2
            exit 2
          fi
          # Guard B: a retired doctrine VALUE (registered in retired-doctrine-patterns.json,
          # e.g. the old hook '>= 7 times' floor) must never re-appear as a LIVE instruction.
          # Any match lacking a retirement context marker exits non-zero and blocks the merge.
          python3 "$GUARD_B"
          echo "doctrine_residual_check: Guard B PASSED — no retired doctrine present as a live instruction."

      - name: test_process_integrity.py — FIX A-G gate tests (exit 0 required)
        shell: bash
        run: |
          set -euo pipefail
          T="23-ai-workforce-blueprint/templates/role-library/presentations/scripts/test_process_integrity.py"
          if [ ! -f "$T" ]; then echo "FATAL: $T not found" >&2; exit 2; fi
          # Negative+positive tests for the process-integrity gates: no-skip proof
          # (prove-deck), one-question-per-turn intake, mandatory artifact_sha,
          # producer!=QC distinctness, fail-soft CC board, substance verifiers, and
          # single-source/no-duplicate department slugs. Any regression exits non-zero.
          python3 "$T"
          echo "test_process_integrity: all FIX A-G gate tests PASSED."

      - name: CANONICAL-RENDERER-PIN.sha256 — recompute + verify (FIX I, GATE 3 fleet-wide)
        shell: bash
        run: |
          set -euo pipefail
          SCR="23-ai-workforce-blueprint/templates/role-library/presentations/scripts"
          PIN="$SCR/CANONICAL-RENDERER-PIN.sha256"
          if [ ! -f "$PIN" ]; then
            echo "FATAL: $PIN missing — GATE 3 (renderer hash pin) cannot enforce fleet-wide." >&2
            exit 1
          fi
          # Recompute the renderer-pair hash the SAME way presentation-canonical-entry.sh
          # GATE 3 does (sha256 of build_deck.py + run_signature_deck.py, in that order).
          # A legit engine change MUST regenerate the pin in the same commit, or this fails.
          if command -v sha256sum >/dev/null 2>&1; then
            COMPUTED=$(cat "$SCR/build_deck.py" "$SCR/run_signature_deck.py" | sha256sum | awk '{print $1}')
          else
            COMPUTED=$(cat "$SCR/build_deck.py" "$SCR/run_signature_deck.py" | shasum -a 256 | awk '{print $1}')
          fi
          EXPECTED=$(tr -d ' \t\n' < "$PIN")
          if [ "$EXPECTED" != "$COMPUTED" ]; then
            echo "FAIL: CANONICAL-RENDERER-PIN.sha256 is STALE." >&2
            echo "  pinned:   $EXPECTED" >&2
            echo "  computed: $COMPUTED" >&2
            echo "  Fix: cat build_deck.py run_signature_deck.py | sha256sum | awk '{print \$1}' > $PIN" >&2
            exit 1
          fi
          echo "renderer pin verified ($COMPUTED) — GATE 3 will enforce this head fleet-wide."

      - name: STANDARD-presenter-speech-layout.pdf present (H7 gate)
        shell: bash
        run: |
          set -euo pipefail
          PDF="23-ai-workforce-blueprint/templates/role-library/presentations/scripts/STANDARD-presenter-speech-layout.pdf"
          if [ ! -f "$PDF" ]; then
            echo "FAIL: $PDF is absent." >&2
            echo "Fix: run python3 .../presenters_speech_pdf.py --sample --out STANDARD-presenter-speech-layout.pdf" >&2
            echo "and commit the generated file. See H7 in the presentation review." >&2
            exit 1
          fi
          SIZE=$(wc -c < "$PDF")
          if [ "$SIZE" -lt 1000 ]; then
            echo "FAIL: $PDF exists but is only $SIZE bytes — likely an empty or truncated file." >&2
            exit 1
          fi
          echo "STANDARD-presenter-speech-layout.pdf present ($SIZE bytes)."
