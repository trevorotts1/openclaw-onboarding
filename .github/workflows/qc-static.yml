      - name: FLEET-STANDARDS §3 — WhatsApp permanently disabled (no enabled:true in JSON, no uncommented WHATSAPP_NUMBER in env files)
        shell: bash
        run: |
          set -euo pipefail
          # Fleet-wide ban (FLEET-STANDARDS.md §3): WhatsApp MUST NEVER be enabled in
          # any tracked JSON config or .env file. The Hostinger wrapper auto-installs
          # WhatsApp on every boot when WHATSAPP_NUMBER is uncommented, causing a
          # QR-scan crash-loop that takes the entire gateway down. Two checks:
          #   1. No tracked JSON file has "whatsapp":{..."enabled":true}
          #   2. No tracked env file has an uncommented WHATSAPP_NUMBER= line
          fail=0

          # 1. JSON: plugins.entries.whatsapp.enabled must not be true
          # Use a one-liner to avoid multi-line Python indentation issues in YAML.
          # An empty or unparseable *.json file (e.g. a verbatim-empty evidence
          # capture whose real output landed in a sibling .err) is NOT a whatsapp
          # config and must not be misread as a violation: json.load would raise,
          # exit the one-liner non-zero, and the `if !` below would false-flag it.
          # `.read().strip() or '{}'` treats an empty/whitespace-only file as the
          # empty object {} (no whatsapp key -> clean) while parsing real JSON
          # normally, so a genuine "whatsapp":{"enabled":true} still fails.
          while IFS= read -r f; do
            if ! python3 -c "import json,sys; d=json.loads(open(sys.argv[1]).read().strip() or '{}'); sys.exit(1 if isinstance(d, dict) and d.get('plugins',{}).get('entries',{}).get('whatsapp',{}).get('enabled') else 0)" "$f" 2>/dev/null; then
              echo "✗ $f: plugins.entries.whatsapp.enabled is true (fleet ban violation)"
              fail=1
            fi
          done < <(git ls-files -- '*.json' 2>/dev/null || find . -not -path './.git/*' -name '*.json')

          # 2. .env files: no uncommented WHATSAPP_NUMBER=
          while IFS= read -r f; do
            if grep -qE '^[[:space:]]*WHATSAPP_NUMBER[[:space:]]*=[^#]' "$f" 2>/dev/null; then
              echo "✗ $f: contains uncommented WHATSAPP_NUMBER= (fleet ban violation — see FLEET-STANDARDS.md §3)"
              fail=1
            fi
          done < <(git ls-files -- '.env' '*.env' 2>/dev/null || find . -not -path './.git/*' \( -name '.env' -o -name '*.env' \))

          [ $fail -eq 0 ] && echo "✓ WhatsApp fleet ban: no enabled:true in JSON, no uncommented WHATSAPP_NUMBER= in env files"
          exit $fail

      - name: AGENTS.md N28 — No destructive cron payloads (rm -rf / npm uninstall -g openclaw / brew uninstall)
        shell: bash
        run: |
          set -euo pipefail
          # N28 invariant (AGENTS.md): cron payloads must NEVER contain destructive
          # commands that could wipe the client's install. The kill-script incident
          # (old Skill 23 *-kill cron before v10.14) proved this destroys client boxes
          # silently. Gate fails on any shell script that:
          #   - contains 'rm -rf' with a path touching ~/.openclaw or ~/clawd
          #   - contains 'npm uninstall -g openclaw'
          #   - contains 'brew uninstall' with openclaw or cloudflared
          # Scans only .sh files (cron payloads are always shell).
          fail=0
          while IFS= read -r f; do
            # rm -rf targeting install paths
            if grep -nE 'rm[[:space:]]+-rf[[:space:]].*(\~/.openclaw|~/clawd|\$HOME/.openclaw|\$HOME/clawd|/data/.openclaw)' "$f" 2>/dev/null | grep -v '^[[:space:]]*#'; then
              echo "✗ $f: contains rm -rf on an OpenClaw install path (N28 violation)"
              fail=1
            fi
            # npm uninstall -g openclaw
            if grep -nE 'npm[[:space:]]+uninstall[[:space:]]+-g[[:space:]]+openclaw' "$f" 2>/dev/null | grep -v '^[[:space:]]*#'; then
              echo "✗ $f: contains npm uninstall -g openclaw (N28 violation)"
              fail=1
            fi
            # brew uninstall openclaw or cloudflared
            if grep -nE 'brew[[:space:]]+uninstall[[:space:]]+(openclaw|cloudflared)' "$f" 2>/dev/null | grep -v '^[[:space:]]*#'; then
              echo "✗ $f: contains brew uninstall of a fleet component (N28 violation)"
              fail=1
            fi
          done < <(git ls-files -- '*.sh' 2>/dev/null || find . -not -path './.git/*' -name '*.sh')
          [ $fail -eq 0 ] && echo "✓ N28: no destructive cron payloads found in tracked shell scripts"
          exit $fail

      - name: chmod-600 coverage — every .sh that writes secrets/.env must also chmod 600
        shell: bash
        run: |
          set -euo pipefail
          # Security invariant: any shell script that WRITES to secrets/.env MUST
          # also call chmod 600 on that file. A world-readable secrets file exposes
          # Cloudflare API tokens, HOOKS tokens, and GHL credentials to any process
          # on the box.
          #
          # "Writes" means an actual redirection (> / >>), tee, or heredoc whose
          # TARGET is a secrets-env path: a SECRETS_ENV / SECRETS_ENV_FILE variable,
          # or a literal path token ending in `secrets/.env`. Scripts that merely
          # READ secrets/.env, mention it in a comment, hold it as a grep/detection
          # pattern, or list it in a path-resolution loop do NOT write the file and
          # must NOT trip this gate. (The previous detector matched ANY mention of
          # `secrets/.env` / `SECRETS_ENV_FILE`, which false-flagged ~45 read-only
          # scripts; every script that genuinely writes the file already chmod 600s
          # it. This detector keeps the real assertion — a true writer with no
          # chmod 600 still fails — while dropping the false positives.)
          fail=0
          # Redirect-or-tee operator immediately before a secrets-env target.
          WRITE_PAT='>>?[[:space:]]*"?(\$\{?SECRETS_ENV([A-Z_]*)?\}?|[^"[:space:]]*secrets/\.env)|tee[[:space:]]+(-a[[:space:]]+)?"?(\$\{?SECRETS_ENV|[^"[:space:]]*secrets/\.env)'
          while IFS= read -r f; do
            # Strip comment-only lines; keep lines that write a secrets-env target;
            # drop stderr / fd / /dev/null redirections that are not real writes.
            writes="$(grep -vE '^[[:space:]]*#' "$f" 2>/dev/null \
                       | grep -E "$WRITE_PAT" 2>/dev/null \
                       | grep -vE '2>|>&|>[[:space:]]*/dev/null' || true)"
            if [ -n "$writes" ]; then
              # It writes the file — does it also chmod 600 it?
              if ! grep -qE 'chmod[[:space:]]+600' "$f" 2>/dev/null; then
                echo "✗ $f: writes secrets/.env but never calls chmod 600 (secrets would be world-readable)"
                fail=1
              fi
            fi
          done < <(git ls-files -- '*.sh' 2>/dev/null || find . -not -path './.git/*' -name '*.sh')
          [ $fail -eq 0 ] && echo "✓ chmod-600 coverage: all .sh scripts that write secrets/.env also call chmod 600"
          exit $fail

      - name: No banned model tokens in GHL skill markdown prose (M2 / Anthropic / non-Ollama Kimi)
        shell: bash
        run: |
          set -uo pipefail
          # Machine-enforce model doctrine in MARKDOWN PROSE across the five GHL skills
          # and shared docs. PRD §12.5 + RELEASE-RUNBOOK step 6 specify the local scan
          # already covers *.md via --include="*.md"; this CI step closes the same gap
          # in the automated build so a regression that introduces a banned model token
          # into markdown prose fails the build without any manual pre-merge step.
          #
          # Four violation classes — all fail the build:
          #   (a) minimax-m2 / minimax_m2 / minimax/minimax-m2 as model id slugs
          #   (b) Bare M2 used as a live model id in a rung/ladder context
          #   (c) Anthropic model slugs (claude-*, anthropic/*, us.anthropic.*) as usable models
          #   (d) Kimi referenced without the required ollama/ or openrouter/ prefix
          #
          # False-positive guards for (c)/(d) are SHAPE-based, not word-based: a match is
          # excluded ONLY when the specific occurrence itself is a known-compliant slug
          # form (provider-prefixed, or the documented bare `:cloud` form / the literal
          # `claude-desktop`/`claude-code` non-model tokens) via negative lookaround
          # anchored to that exact token. This is deliberate: an earlier design excluded
          # any line containing a nearby prose word (removed/replaced/forbidden/purged/
          # etc.), which could MASK a real live banned slug sharing that line with such
          # a word (e.g. "replaced with openrouter/minimax/minimax-m2" or "removed the
          # old ref, now bare kimi-k2.6 is used") — a false-negative hole. Shape-based
          # per-occurrence matching closes that hole: only the compliant occurrence
          # itself is spared, so a co-located banned slug is still caught.
          SKILL_DIRS="05-ghl-setup 06-ghl-install-pages 29-ghl-convert-and-flow 36-ghl-mcp-setup 44-convert-and-flow-operator"
          SHARED_DOCS="docs"
          ALL_DIRS="$SKILL_DIRS $SHARED_DOCS"
          fail=0

          # --- FAIL-OPEN GUARD ---------------------------------------------------
          # An empty (or all-whitespace) ALL_DIRS would make every `grep -r ... $ALL_DIRS`
          # call below receive NO path arguments. Unquoted `$ALL_DIRS` word-splits to
          # nothing, and grep with zero path operands silently falls back to scanning
          # CWD (`.`) instead of erroring — so a future refactor that accidentally
          # empties SKILL_DIRS/SHARED_DOCS would make this step scan the wrong (or a much
          # larger/unintended) tree while still printing a green checkmark on a clean
          # exit. That is a fail-open hole: the gate's pass/fail no longer reflects
          # whether the intended scope was actually checked. Refuse to run instead.
          # shellcheck disable=SC2206
          _all_dirs_arr=($ALL_DIRS)
          if [ "${#_all_dirs_arr[@]}" -eq 0 ]; then
            echo "✗ ALL_DIRS expanded to an empty path list — refusing to run (grep with no path args silently falls back to scanning CWD instead of the intended skill/doc dirs)"
            exit 1
          fi
          for _d in "${_all_dirs_arr[@]}"; do
            if [ ! -e "$_d" ]; then
              echo "✗ ALL_DIRS entry '$_d' does not exist on disk — refusing to run with a missing/typo'd scan target"
              exit 1
            fi
          done
          # -------------------------------------------------------------------------

          # (a) minimax-m2 / minimax_m2 / minimax/minimax-m2 slug forms — always banned
          #     as live model ids; ban-statements say "MiniMax M2" not the hyphenated slug,
          #     so no false-positive exclusion needed here.
          m2_slug_hits=$(grep -rEin "minimax-m2|minimax_m2|minimax/minimax-m2" \
              $ALL_DIRS --include="*.md" 2>/dev/null | grep -v "^Binary" || true)
          if [ -n "$m2_slug_hits" ]; then
            echo "$m2_slug_hits"
            echo "✗ Found banned minimax-m2 model id slug in GHL skill/shared markdown"; fail=1
          fi

          # (b) Bare M2 used as a live model identifier in a rung/ladder context.
          #     Targeted patterns match: "MiniMax M3→M2", "M3→M2 /", "(MiniMax|minimax) M2".
          #     Excluded: lines with ban/purge/supersede language (historical notes allowed),
          #     migration-unit labels (e.g. "migration M2 does this").
          m2_bare_hits=$(grep -rEn \
              "MiniMax M3\s*[→>-]+\s*M2|M3\s*[→>-]+\s*M2|(MiniMax|minimax)\s+M2\b" \
              $ALL_DIRS --include="*.md" 2>/dev/null \
              | grep -viE "banned|PURGED|purge|do not|never use|must not|supersede|migration M|removed the stale" \
              | grep -v "^Binary" || true)
          if [ -n "$m2_bare_hits" ]; then
            echo "$m2_bare_hits"
            echo "✗ Found M2 used as a live model id (rung/ladder context) in GHL skill/shared markdown"; fail=1
          fi

          # (c) Anthropic model slugs (claude-*, anthropic/*, us.anthropic.*) as usable
          #     models. SHAPE-based exclusion (not word-based): the ONLY spared
          #     occurrences are the exact literal non-model tokens `claude-desktop`
          #     (mcporter import source) and `claude-code` (Anthropic CLI product name
          #     when hyphenated) — matched via negative lookahead directly on the
          #     "claude-" token, so a real slug (e.g. claude-opus-4) co-located on the
          #     same line as ban/forbidden/rejected prose is still caught. Plain-English
          #     "Claude"/"Anthropic" mentions without a hyphen/slash never match the
          #     positive pattern at all, so doctrine prose naming the ban is unaffected.
          anthropic_hits=$(grep -rinP \
              'claude-(?!desktop\b)(?!code\b)[a-z0-9-]+|anthropic/[a-z0-9-]+|us\.anthropic\.[a-z0-9.-]*' \
              $ALL_DIRS --include="*.md" 2>/dev/null \
              | grep -v "^Binary" || true)
          if [ -n "$anthropic_hits" ]; then
            echo "$anthropic_hits"
            echo "✗ Found Anthropic model slug as a usable model in GHL skill/shared markdown"; fail=1
          fi

          # (d) Kimi referenced without the required ollama/ or openrouter/ prefix.
          #     SHAPE-based exclusion (not word-based): only a genuine `kimi-<slug>`
          #     token is a candidate at all (plain-English "Kimi 2.6" prose with no
          #     hyphen never matches, so introducing the model by name before giving
          #     its qualified slug is unaffected). A candidate token is spared ONLY when
          #     it is immediately preceded by `ollama/`, `openrouter/`, or `moonshotai/`
          #     (negative lookbehind) OR immediately followed by the documented bare
          #     `:cloud` form (negative lookahead) — both anchored to that exact token,
          #     not "anywhere on the line". A possessive quantifier prevents the regex
          #     engine from backtracking into a false-safe partial match (e.g. matching
          #     only "kimi-k2." to satisfy the ":cloud" lookahead early). This means a
          #     bare, unqualified kimi-k2.6 mention is caught even when "removed",
          #     "replaced", "stale", etc. appear elsewhere on the same line.
          kimi_hits=$(grep -rinP \
              '(?<!ollama/)(?<!openrouter/)(?<!moonshotai/)\bkimi-[a-zA-Z0-9][a-zA-Z0-9._-]*+(?!:cloud)\b' \
              $ALL_DIRS --include="*.md" 2>/dev/null \
              | grep -v "^Binary" || true)
          if [ -n "$kimi_hits" ]; then
            echo "$kimi_hits"
            echo "✗ Found Kimi referenced without ollama/ or openrouter/ prefix in GHL skill/shared markdown"; fail=1
          fi

          [ $fail -eq 0 ] && echo "✓ No banned model tokens in GHL skill/shared markdown (minimax-m2 / Anthropic / bare Kimi)"
          exit $fail

      - name: No secret-printing greps in 36/38 shipped SOPs (FIX-XC-07)
        shell: bash
        run: |
          set -uo pipefail
          # Deterministic shipped gate: a bare `grep -iE 'GHL_API_KEY|...' "$SECRETS_ENV"`
          # in a shipped SOP prints the MATCHED LINE — the secret's VALUE — into
          # transcripts/logs. Every secret-pattern grep in the cross-skill 36+38 docs
          # must be existence-only (-q, or -l/-L for filenames), or read names only
          # (a value-stripping `cut -d= -f1` stage before it). The gate inspects the
          # grep PATTERN, not the file argument, so reading a NON-secret value like a
          # model id out of the secrets file is correctly NOT flagged.
          bash scripts/qc-assert-no-secret-printing-grep.sh .
          # Negative self-test: a planted value-printing secret grep MUST FAIL (exit 1).
          ng="$(mktemp -d)"
          mkdir -p "$ng/36-ghl-mcp-setup" "$ng/scripts"
          cp scripts/qc-assert-no-secret-printing-grep.sh "$ng/scripts/"
          printf 'grep -iE "GHL_API_KEY|GHL_PIT" "$SECRETS_ENV"\n' > "$ng/36-ghl-mcp-setup/BAD.md"
          rc=0
          bash "$ng/scripts/qc-assert-no-secret-printing-grep.sh" "$ng" >/dev/null 2>&1 || rc=$?
          rm -rf "$ng"
          [ "$rc" -eq 1 ] || { echo "✗ secret-printing gate should FAIL (exit 1) on a planted value-printing grep, got $rc"; exit 1; }
          echo "✓ Secret-printing grep gate is clean and proven to bite on a value-printing grep"

      - name: Command Center task-API write-back auth doctrine (401 fix)
        shell: bash
        run: |
          set -uo pipefail
          # Dispatched department/persona agents finish work and write the result
          # back to the Command Center task API (POST .../activities,
          # .../deliverables, PATCH status, POST .../events, POST
          # .../return-to-orchestrator). The CC is FAIL-CLOSED: every non-ingest
          # write-back call needs `Authorization: Bearer $MC_API_TOKEN` or it 401s
          # — the finished task freezes in_progress until a stale sweep blocks it.
          # guard-taskapi-auth-docs.sh scans every tracked .md/.sh/.py write-back
          # EXAMPLE an agent would copy (a POST/PATCH invocation line, in a fenced
          # code block or bare prose) and FAILS if its surrounding block/window
          # carries no Authorization/Bearer mention. /api/tasks/ingest (HMAC path)
          # and server source-path citations (src/app/api/tasks/[id]/route.ts) are
          # exempt; CHANGELOG.md files are exempt.
          bash scripts/guard-taskapi-auth-docs.sh
          echo "✓ Every Command Center write-back example carries Authorization: Bearer \$MC_API_TOKEN"

      - name: Command Center write-back auth guard negative test (fixture)
        shell: bash
        run: |
          set -uo pipefail
          # Prove guard-taskapi-auth-docs.sh actually FAILS on a planted
          # unauthenticated write-back example (a green gate that never fails is
          # worthless). The guard shells out to `git ls-files`, so the fixture
          # needs its own throwaway git repo: copy the guard alone, git init, plant
          # an unauthenticated POST .../activities example, stage it, and assert
          # exit 1; then remove the plant, re-stage, and assert exit 0.
          ng="$(mktemp -d)"
          mkdir -p "$ng/scripts" "$ng/universal-sops"
          cp scripts/guard-taskapi-auth-docs.sh "$ng/scripts/"
          ( cd "$ng" && git init -q && git config user.email t@example.test && git config user.name t )
          printf '%s\n' \
            '```' \
            'POST {missionControlUrl}/api/tasks/{task.id}/activities' \
            '{"activity_type": "completed", "message": "no auth"}' \
            '```' \
            > "$ng/universal-sops/BAD.md"
          ( cd "$ng" && git add -A )
          rc=0
          bash "$ng/scripts/guard-taskapi-auth-docs.sh" --repo-root "$ng" >/dev/null 2>&1 || rc=$?
          [ "$rc" -eq 1 ] || { echo "✗ write-back auth gate should FAIL (exit 1) on a planted unauthenticated example, got $rc"; rm -rf "$ng"; exit 1; }
          rm -f "$ng/universal-sops/BAD.md"
          ( cd "$ng" && git add -A )
          rc2=0
          bash "$ng/scripts/guard-taskapi-auth-docs.sh" --repo-root "$ng" >/dev/null 2>&1 || rc2=$?
          rm -rf "$ng"
          [ "$rc2" -eq 0 ] || { echo "✗ write-back auth gate should PASS (exit 0) once the unauthenticated example is removed, got $rc2"; exit 1; }
          echo "✓ guard-taskapi-auth-docs negative test passes (fails on a planted unauthenticated example, passes once removed)"
