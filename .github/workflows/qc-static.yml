      - name: Skill 03 fail-first fixture (pre-fix qc-agent-browser.sh at pinned pre-P3-06 SHA)
        shell: bash
        run: |
          set -uo pipefail
          # The P3-06 fail-first proofs in pack-agent-browser-skill.test.sh,
          # qc-agent-browser-drift-gate.test.sh, and
          # qc-agent-browser-reaper-assert.test.sh each need a copy of
          # qc-agent-browser.sh as it existed BEFORE this unit's drift-gate /
          # assert-not-warn changes landed, to prove the gap was real (the
          # pre-fix script silently PASSes a corrupted archive / a leaked
          # session) before proving the fix closes it. Without this fixture
          # every one of those tests silently SKIPs its fail-first branch and
          # CI never actually exercises fail-first.
          #
          # PIN (not origin/main): the fixture is derived from the PINNED
          # last-blind commit 49b88cd5832a99ff7885036d7e9dbc78c43b9a2d — the
          # parent of P3-06 (73ff2975), the last tree state where
          # 03-agent-browser/qc-agent-browser.sh still lacks the drift gate.
          # `origin/main` is a MOVING ref: once P3-06 merged to main, the file
          # there carries the drift gate, so a `git show origin/main:...` capture
          # is no longer "pre-fix" and this step's own sanity check fails
          # permanently. Pinning the SHA (mirrors agent-browser-lifecycle-guard,
          # which pins the SAME 49b88cd5 commit) makes the capture a faithful,
          # stable pre-fix snapshot forever. fetch-depth:0 on the checkout above
          # makes this ancestor SHA resolvable — no network fetch needed here.
          PREFIX_PIN="49b88cd5832a99ff7885036d7e9dbc78c43b9a2d"
          git show "${PREFIX_PIN}:03-agent-browser/qc-agent-browser.sh" > /tmp/qc-agent-browser.sh.prefix-fixture
          chmod +x /tmp/qc-agent-browser.sh.prefix-fixture
          # Sanity: the captured fixture must NOT already contain this unit's
          # drift-gate/assert marker -- if it does, the pinned SHA is wrong / has
          # been advanced past the fix and the fixture is no longer "pre-fix"
          # (fail closed, don't let the fail-first tests silently SKIP or
          # silently pass-through).
          if grep -q "is STALE vs on-disk source" /tmp/qc-agent-browser.sh.prefix-fixture; then
            echo "✗ pinned ${PREFIX_PIN}:03-agent-browser/qc-agent-browser.sh already contains the P3-06 drift gate -- this is no longer a valid pre-fix fixture. Re-pin to the actual pre-P3-06 commit." >&2
            exit 1
          fi
          echo "✓ pre-fix qc-agent-browser.sh fixture captured at /tmp/qc-agent-browser.sh.prefix-fixture ($(wc -l < /tmp/qc-agent-browser.sh.prefix-fixture) lines, no drift gate present; pinned ${PREFIX_PIN})"

