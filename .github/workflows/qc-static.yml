name: QC static checks

# Wave 5.2 of the post-analysis remediation. The full qc-system-integrity.sh
# needs a live OpenClaw install (~/.openclaw/ or /data/.openclaw/) so it can't
# run in CI as-is. This job runs the static subset — invariants that are
# detectable from the repo alone — so we catch regressions on every push:
#
#   • All Python scripts in shared-utils/ and active skills parse without error
#   • DEFAULT_WEIGHTS in adaptive_weights.py sums to 1.0
#   • company-config.template.json is valid JSON (schema v2.0)
#   • persona-categories.json is valid JSON
#   • No Anthropic model strings in Skill 22/23 scripts
#   • No flat-constant scoring (0.7/0.7/0.8/0.8) lingering in persona-selector-v2.py
#
# Triggers on every push to main and every PR targeting main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qc-static:
    name: QC static invariants
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax (shared-utils + Skill 22/23 scripts)
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          for f in $(find shared-utils 22-book-to-persona-coaching-leadership-system 23-ai-workforce-blueprint -type f -name '*.py'); do
            python3 -c "import ast; ast.parse(open('$f').read())" || { echo "  ✗ syntax: $f"; fail=1; }
          done
          [ $fail -eq 0 ] && echo "✓ Python syntax OK across all skill scripts"
          exit $fail

      - name: DEFAULT_WEIGHTS sums to 1.0
        shell: python {0}
        run: |
          import sys
          sys.path.insert(0, 'shared-utils')
          from adaptive_weights import DEFAULT_WEIGHTS
          total = sum(DEFAULT_WEIGHTS.values())
          if not (0.999 <= total <= 1.001):
              print(f"✗ DEFAULT_WEIGHTS sums to {total}, expected 1.0")
              sys.exit(1)
          print(f"✓ DEFAULT_WEIGHTS sums to {total}")

      - name: company-config template is valid JSON
        shell: bash
        run: |
          python3 -c "
          import json, sys
          d = json.load(open('23-ai-workforce-blueprint/templates/company-config.template.json'))
          required = ['schema_version', 'mission', 'owner_values', 'company_kpis', 'dept_kpis']
          missing = [k for k in required if k not in d]
          if missing:
              print(f'✗ missing required fields: {missing}'); sys.exit(1)
          if d['schema_version'] != '2.0':
              print(f'✗ schema_version is {d[\"schema_version\"]}, expected 2.0'); sys.exit(1)
          print('✓ company-config template valid (schema v2.0)')
          "

      - name: No Anthropic model strings in Skill 22/23 scripts
        shell: bash
        run: |
          set -uo pipefail
          if grep -rEn "'(claude-[a-z0-9-]+|anthropic/[a-z0-9-]+)'" 22-book-to-persona-coaching-leadership-system/scripts 23-ai-workforce-blueprint/scripts shared-utils/ 2>&1; then
            echo "✗ Found Anthropic model string(s) above"; exit 1
          fi
          echo "✓ No Anthropic model strings in pipeline scripts"

      - name: persona-selector-v2 no longer uses flat scoring constants
        shell: bash
        run: |
          set -uo pipefail
          # Check that _heuristic_layer_scores is structured (reads cc fields) not flat 0.7/0.8.
          # Specifically: should NOT contain `mission_score = 0.8` or `dept_score = 0.7` as bare assignments.
          if grep -E "^\s*(mission_score|values_score|dept_score|company_kpi_score)\s*=\s*0\.[78](\s|$)" 23-ai-workforce-blueprint/scripts/persona-selector-v2.py 2>&1 | grep -v "= 0\.6"; then
            echo "✗ Flat-constant scoring detected in persona-selector-v2.py"; exit 1
          fi
          echo "✓ No flat-constant scoring in persona-selector-v2.py"

      - name: llm_score module loads
        shell: bash
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, 'shared-utils')
          from llm_score import score_layer, summarize_persona_blueprint, _cache_key, NEUTRAL_FALLBACK_SCORE
          assert callable(score_layer)
          assert callable(summarize_persona_blueprint)
          assert NEUTRAL_FALLBACK_SCORE == 0.6
          k = _cache_key('test-persona', 'mission', 'summary', 'context')
          assert len(k) == 64
          print('✓ llm_score module imports + cache key generation OK')
          "

      - name: Skill 38 GHL RAW BODY 23-key rule
        shell: bash
        run: |
          set -uo pipefail
          # Machine-enforce the 23-key flat placeholder-free GHL body rule across
          # every object-A example in references/ + templates/ + scripts/
          # (now INCLUDING references/v6.0-source-playbook.md).
          bash 38-conversational-ai-system/scripts/qc-23-key-bodies.sh
          echo "✓ All Skill 38 GHL RAW BODY examples satisfy the 23-key rule"

      - name: Skill 38 TRINITY registry reconciliation (fixture tests)
        shell: bash
        run: |
          set -uo pipefail
          # Prove qc-trinity-registry.sh reconciles BOTH the table form and the
          # bullet form (- <id>: <desc>) the installer actually writes — i.e. it
          # catches registered-but-no-files and file-present-but-unregistered.
          bash 38-conversational-ai-system/scripts/qc-trinity-registry.test.sh
          echo "✓ qc-trinity-registry reconciliation fixtures pass"

      - name: Skill 38 mandatory GHL send-directive
        shell: bash
        run: |
          set -uo pipefail
          # Machine-enforce that EVERY GHL inbound SERVER-mapping messageTemplate
          # (installer canonical template + reference examples) carries the
          # mandatory send-directive: SEND, the GHL Conversations API
          # (conversations/messages), the drafting-is-NOT-sending clause, and
          # "do not end your turn until a messageId/conversationId is returned".
          # Drafting != sending — without this clause the agent drafts and stops
          # and the customer gets nothing. Exits non-zero on any GHL inbound
          # template that lacks the directive (or if none are found).
          bash 38-conversational-ai-system/scripts/qc-send-directive.sh
          echo "✓ All Skill 38 GHL inbound server templates carry the mandatory send-directive"

      - name: Skill 38 conversation-memory read-before/append-after
        shell: bash
        run: |
          set -uo pipefail
          # Machine-enforce that EVERY GHL inbound SERVER-mapping messageTemplate
          # (installer canonical template + reference examples) carries the
          # conversation-memory steps: the conversational-logs path, a READ-before-
          # replying instruction, and an APPEND-after-sending instruction. GHL
          # inbound hook sessions are single-turn / stateless — the agent's only
          # memory of a contact across messages is the per-contact log it must read
          # before replying and append to after sending. Dropping these steps left a
          # live client mid-booking with no memory. Exits non-zero on any GHL inbound
          # template that lacks them (or if none are found).
          bash 38-conversational-ai-system/scripts/qc-conversation-memory.sh
          echo "✓ All Skill 38 GHL inbound server templates carry the conversation-memory read-before/append-after steps"

      - name: Skill 38 per-playbook human-facing doc gate (fixture tests)
        shell: bash
        run: |
          set -uo pipefail
          # Machine-enforce the MANDATORY per-playbook human-facing doc deliverable
          # (Notion → Google Docs → plain-text). When a conversation playbook is
          # created (the base install creates the FIRST one — appointment booking),
          # the agent must ALSO create a human-facing copy in the CLIENT's own
          # account and record its URL/path in the registry. On a live client this
          # step was SKIPPED — files scaffolded locally, install reported "clean",
          # but no client doc, leaving the customer with no human-facing reference.
          # qc-playbook-doc.sh is a RUNTIME gate (it reads the client's installed
          # conversation-workflows/registry.md) so CI exercises it via its fixture
          # tests, which prove it: FAILs a registered playbook with no recorded doc
          # (table + bullet forms), PASSes when a Notion/Docs/text doc is recorded,
          # exits 2 (NOT a blind PASS) when no playbooks exist, and catches an
          # on-disk-but-unregistered playbook. qc-static bans claude-/anthropic
          # strings in .py under 22/23, so this gate is BASH (with an inline py core).
          bash 38-conversational-ai-system/scripts/qc-playbook-doc.test.sh
          echo "✓ qc-playbook-doc per-playbook human-facing doc gate fixtures pass"

      - name: Skill 38 client reference sheet copy-paste artifacts
        shell: bash
        run: |
          set -uo pipefail
          # Machine-enforce that the generated CLIENT REFERENCE SHEET always
          # carries the two copy-paste artifacts a client cannot proceed without:
          # the Authorization Bearer token and the GHL Custom Webhook RAW BODY as a
          # real ```json fenced code block (plus the hook URL). On a live client
          # (Teresa) the generated sheet had NO bearer token and NO copyable JSON —
          # nothing to paste into GHL's Build-with-AI — which stranded the client.
          # qc-reference-sheet.sh drives 21-generate-client-reference-sheet.sh in a
          # sandbox (no openclaw on PATH → offline Layer-3 markdown) and FAILS if the
          # rendered sheet lacks "Bearer", a ```json fence, or the hook URL, so a
          # template/script regression that drops them fails the build. BASH (with an
          # inline grep core), so it respects the .py claude-/anthropic ban.
          bash 38-conversational-ai-system/scripts/qc-reference-sheet.sh
          echo "✓ Skill 38 client reference sheet carries the bearer token + copyable GHL Raw Body JSON + hook URL"

      - name: Skill 38 reference sheet is bulletproof (Quick Start + tag-first + post-build verify)
        shell: bash
        run: |
          set -uo pipefail
          # Machine-enforce the BULLETPROOF reference sheet (belt-and-suspenders):
          #   • a section literally named "🚀 Quick Start" FIRST, and a COMPLETE
          #     explanation/reference section AFTER it (both — Quick Start does not
          #     replace the explanation)
          #   • the copy-paste values LEAD, in order: URL → Authorization header
          #     (key + value in SEPARATE code blocks, each its own copy button) →
          #     Content-Type header → Raw Body JSON → manual Custom-Webhook fill
          #     steps → post-build verification → Workflow-AI prompt
          #   • the create-tags-FIRST instruction (+ Settings → Tags pointer): tags
          #     must exist before the workflow is built (Teresa: Build-with-AI made a
          #     "does not contain <blank>" filter against a never-created tag)
          #   • the POST-BUILD verification section (verify trigger/tag-exists +
          #     custom webhook + Published-not-Draft AFTER Build with AI runs)
          #   • the mandatory "Build-with-AI will NOT fill these — do it yourself"
          #     manual-fill instructions
          # GHL's Build-with-AI only builds the workflow SHAPE; it does not reliably
          # populate the Custom Webhook URL / Authorization header / Content-Type /
          # Raw Body, nor does it create the tags its filters reference, so the client
          # MUST paste the values and create the tags by hand. This drives the
          # generator offline (Layer-3 markdown) and FAILs if any of the above is
          # missing. BASH (grep/awk core) — respects the .py claude-/anthropic ban.
          bash 38-conversational-ai-system/scripts/qc-reference-sheet.sh --require-manual-fill
          echo "✓ Skill 38 reference sheet is bulletproof: 🚀 Quick Start + explanation, separate Authorization key/value blocks, tag-first, manual-fill, post-build verification"

      - name: Skill 38 install-script config-key gate
        shell: bash
        run: |
          set -uo pipefail
          # Machine-enforce that NO install script writes a config shape that
          # invalidates the openclaw 2026.5.27 config (so a fresh install can't ship a
          # config that fails `openclaw config validate`), and that none trips the
          # known jq-1.7 / pointer-sourcing install bugs. Specifically FAILS on:
          #   • agents.defaults.async / agents.defaults.batch WRITES (rejected by the
          #     .strict() 2026.5.27 schema)
          #   • a legacy cron.jobs JSON config block (does not validate on 2026.5.27 —
          #     crons must be registered via `openclaw cron add`)
          #   • the jq-1.7-invalid top-level `.x //= {};` update-assignment
          #   • sourcing the master-files POINTER (a bare path / directory) with `.`
          #   • a hardcoded legacy skill path (~/clawd/skills/38-openclaw-cloudflare-tunnel)
          # All five were verified live on a 2026.5.27 box (v1.4.11). BASH — respects
          # the .py claude-/anthropic ban.
          bash 38-conversational-ai-system/scripts/qc-config-keys.sh
          echo "✓ No Skill 38 install script writes a config-invalidating shape or trips the known install bugs"

      - name: Skill 38 mandatory Telegram doc-delivery gate
        shell: bash
        run: |
          set -uo pipefail
          # Machine-enforce the MANDATORY Telegram delivery of the client's
          # setup-doc LINK. Every client gets their link via Telegram, no matter
          # what — the operator was tired of repeating this, so it's a gated step,
          # not prose. The install is NOT complete until the client has been SENT
          # their Quick-Start / Notion doc link via the OpenClaw gateway
          # (openclaw message send --channel telegram). qc-notify-client-doc.sh
          # statically asserts that scripts/22-notify-client-doc.sh exists, sends
          # via the gateway (never curl api.telegram.org), DISCOVERS the chat from
          # the TRANSCRIPTS (agents/*/sessions/*.jsonl — the four shapes, most-
          # frequent non-operator id — the Teresa lesson, NOT just sessions.json
          # keys), LOUD-fails (clientDocDelivered=false + non-zero) when no chat is
          # found, and is wired into INSTRUCTIONS.md + the v6.0 playbook + the comms
          # standard. BASH (grep/awk core) — respects the .py claude-/anthropic ban.
          bash 38-conversational-ai-system/scripts/qc-notify-client-doc.sh
          echo "✓ Skill 38 mandatory Telegram doc-delivery is wired (22-notify-client-doc.sh + binding instructions)"

      - name: Skill 38 GHL TOOLS.md quick-reference (complete + concise + zero personal data)
        shell: bash
        run: |
          set -uo pipefail
          # Machine-enforce the GHL API quick-reference block that
          # scripts/24-update-tools-md.sh injects into the CLIENT TOOLS.md so the
          # agent has the exact request shapes in its CORE context and replies fast
          # (no digging through the dense full reference at runtime). The gate scans
          # the canonical source (references/ghl-api-quick-reference.md, injected
          # verbatim) and FAILS if it is missing any listed operation (each
          # messaging channel type SMS/Email/FB/IG/Live_Chat, calendars
          # list/get/create, free-slots, appointment book/reschedule/cancel, send
          # invoice) or any required PIT scope, if it exceeds the concise size
          # budget (no core-file bloat), or if any personal/client identifier
          # (real email/phone, concrete id, real client host) appears in this
          # UNIVERSAL artifact. Verified shapes per Skill 38
          # references/GHL-INBOUND-AND-PLAYBOOKS.md §7-9 (Version: 2021-04-15; the
          # 6 valid send types; GMB is NOT a send type) + 29-ghl-convert-and-flow
          # references/{conversations,calendars,payments}.md. BASH (inline py core)
          # — respects the .py claude-/anthropic ban.
          bash 38-conversational-ai-system/scripts/qc-tools-md-ghl-ref.sh
          echo "✓ Skill 38 GHL TOOLS.md quick-reference is complete, concise, and free of personal/client data"

      - name: Skill 38 ZHC programmatic-tag-prefix rule (Round-3 Queue-A)
        shell: bash
        run: |
          set -uo pipefail
          # Machine-enforce the ZHC tag-prefix rule (v1.5.0): every tag the agent
          # creates PROGRAMMATICALLY carries the `ZHC-` prefix, so operators can tell
          # agent-created tags apart from their own. qc-zhc-tag-prefix.sh asserts:
          # MEMORY Rule 20 is appended (06-append-memory-rules.sh), the
          # SKILL38_ZHC_TAG_PREFIX behavioral block is inserted (05-update-agents-md.sh),
          # the dedicated protocol (zhc-tag-prefix-protocol.md) exists + states "NOT
          # retroactive" + reuses the existing D.1/Section-6 create_tag mechanism, every
          # Round-3 Queue-A feature tag (ZHC-tension-detected, ZHC-aggression-detected,
          # ZHC-interrupt-handled, ZHC-faq-detoured, ZHC-aggression-handled-and-resumed,
          # ZHC-out-of-service-area/-confirmed/-flexible, ZHC-faq-answered,
          # ZHC-bot-suspected) is present + ZHC-prefixed, and the D.1 + Section-6 example
          # tags were updated to the ZHC- form with no bare agent-created example left
          # behind. BASH (grep core) — respects the .py claude-/anthropic ban.
          bash 38-conversational-ai-system/scripts/qc-zhc-tag-prefix.sh
          echo "✓ Skill 38 ZHC tag-prefix rule enforced: every programmatic-tag example uses the ZHC- prefix"

      - name: Skill 38 UNIVERSAL no-personal-data gate (Round-3 Queue-A additions)
        shell: bash
        run: |
          set -uo pipefail
          # The skill is UNIVERSAL — ZERO real personal/client identifiers anywhere
          # in the tree (the Round-3 Queue-A protocols + scripts must use generic
          # placeholders only). Runs the static (--no-gen) scan in CI so a leaked
          # name in any new file fails the build. BASH (grep core).
          bash 38-conversational-ai-system/scripts/qc-no-personal-data.sh --no-gen
          echo "✓ Skill 38 carries no personal/client data (UNIVERSAL)"
