              print("Fix: add the file to docs/LEGACY-RETIREMENT.md (if it is a known legacy loop")
              print("pending cleanup) OR remove the local path list and use get_openclaw_paths()")
              print("from shared-utils/detect_platform.py instead.")
              sys.exit(1)

          print(f"✓ AF3 guard: no rogue ~/clawd candidate-loop items outside the {len(ALLOWLIST)}-file retirement allowlist")

      # AF3: local-candidate-loop guard — negative fixture test.
      # Proves the guard above ACTUALLY FAILS when a new file in 32-command-center-setup
      # (or elsewhere) plants a local ~/clawd candidate-loop that is NOT on the allowlist.
      # A guard that never bites is useless.
