              r'|^\s*Path\.home\(\)\s*/\s*["\']clawd[^"\']*["\'].*,\s*(?:#.*)?$'
              r'|^\s*Path\(os\.path\.expanduser\(["\']~/clawd/.*\)\)\s*,\s*(?:#.*)?$'
