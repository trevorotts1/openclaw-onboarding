          print(f"✓ docs/LEGACY-RETIREMENT.md present and references all {len(ALLOWLIST)} allowlisted files")

          violations = []
          for py_file in sorted(Path(".").rglob("*.py")):
              rel = str(py_file).lstrip("./")
              # Skip git internals, archives, and explicitly allowlisted files
