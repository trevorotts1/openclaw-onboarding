      - name: Skill 42 SOP naming convention is consistent (PA-NN-NN-slug.md)
        shell: bash
        run: |
          set -uo pipefail
          # D3 regression guard: EVERY SOP under specialists/*/SOP/ (excluding 00-INDEX.md)
          # must match PA-NN-NN-<slug>.md — a hyphen-separated descriptive slug (the
          # convention used by all 29 specialists; slug case is intentionally mixed
          # across the library, so this accepts both Title-Case and lowercase). It
          # REJECTS the two patterns D3 flagged: bare PA-NN-NN.md (no slug) and
          # underscore-separated PA-NN-NN_Title.md filenames. This is the gate that was
          # missing: the install/verify scripts only check PRESENCE + count (162), not
          # naming, so a regression to a bare/underscore name would pass them silently.
          bad=$(find 42-personal-assistant-library/specialists -path '*/SOP/*.md' \
                  -not -name '00-INDEX.md' -print \
                | sed 's#.*/##' \
                | grep -Ev '^PA-[0-9]{2}-[0-9]{2}-[A-Za-z0-9]+(-[A-Za-z0-9]+)*\.md$' || true)
          if [ -n "$bad" ]; then
            echo "✗ Non-conforming SOP filename(s) (expected PA-NN-NN-slug.md):"
            echo "$bad" | sed 's/^/    /'
            exit 1
          fi
