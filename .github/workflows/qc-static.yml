      # AF3: local-candidate-loop guard
      # Catch any Python file that adds a rogue local ~/clawd candidate loop
      # (roots.extend / inline list item of the form HOME/"clawd"... or
      # expanduser("~/clawd/...") with a trailing comma) outside the explicitly
      # tracked retirement allowlist in docs/LEGACY-RETIREMENT.md.
      # Covers 32-command-center-setup AND the wider repo.
      #
      # Pattern matched: a list-item expression (trailing comma) containing:
      #   HOME / "clawd" / ...        or
      #   Path.home() / "clawd" / ... or
      #   Path(os.path.expanduser("~/clawd/..."))  or
      #   os.path.expanduser("~/clawd/...")
      #
      # Single-path assignments (no trailing comma) are NOT matched — they are
      # legitimate single-path lookups, not candidate loops.
      #
      # Retirement allowlist (KNOWN legacy loops tracked in docs/LEGACY-RETIREMENT.md):
      #   32-command-center-setup/scripts/generate-kpi-rollup.py   [AF3(a) primary]
      #   32-command-center-setup/scripts/generate-brand-css.py    [AF3(a) primary]
      #   32-command-center-setup/scripts/seed-workspaces.py
      #   32-command-center-setup/scripts/seed-dashboard-content.py
      #   23-ai-workforce-blueprint/scripts/populate-sops-from-manifest.py
      #   23-ai-workforce-blueprint/scripts/sync-md-content-to-db.py
      #   23-ai-workforce-blueprint/scripts/backfill-build-state.py
      #   23-ai-workforce-blueprint/scripts/reconcile-legacy-tree.py
      #   23-ai-workforce-blueprint/scripts/persona-selector-v2.py
      #   23-ai-workforce-blueprint/scripts/_qc_company_info.py   [v11.18.4 bash-3.2 extraction]
      #   23-ai-workforce-blueprint/templates/presentation-render/kie_generate.py  [secrets/.env fallback]
      #   23-ai-workforce-blueprint/templates/role-library/presentations/scripts/build_deck.py   [secrets/.env fallback]
      #   23-ai-workforce-blueprint/templates/role-library/presentations/scripts/kie_generate.py  [secrets/.env fallback]
      #   22-book-to-persona-coaching-leadership-system/pipeline/orchestrator.py
      #   shared-utils/key_resolver.py
      #   shared-utils/api_key_utils.py
      #   shared-utils/llm_score.py
      #
      # A planted new candidate-loop outside this allowlist FAILS the build.
      - name: "AF3: local-candidate-loop guard (32-command-center-setup + repo-wide)"
        shell: python {0}
        run: |
          import re, sys
          from pathlib import Path

          # Allowlisted files — KNOWN legacy loops tracked in docs/LEGACY-RETIREMENT.md.
          # These are the ONLY files permitted to contain local ~/clawd candidate loops.
          # Any Python file NOT here that adds a ~/clawd list-item candidate loop fails CI.
          ALLOWLIST = {
              # 32-command-center-setup (primary AF3 scope)
              "32-command-center-setup/scripts/generate-kpi-rollup.py",
              "32-command-center-setup/scripts/generate-brand-css.py",
              "32-command-center-setup/scripts/seed-workspaces.py",
              "32-command-center-setup/scripts/seed-dashboard-content.py",
              # 23-ai-workforce-blueprint
              "23-ai-workforce-blueprint/scripts/populate-sops-from-manifest.py",
              "23-ai-workforce-blueprint/scripts/sync-md-content-to-db.py",
              "23-ai-workforce-blueprint/scripts/backfill-build-state.py",
              "23-ai-workforce-blueprint/scripts/reconcile-legacy-tree.py",
              "23-ai-workforce-blueprint/scripts/persona-selector-v2.py",
              # v11.18.4: byte-equivalent ~/clawd fallback loop extracted out of
              # qc-completeness.sh's inline resolver heredoc (bash-3.2 fix). Same
              # legacy loop as the rest of this list — calls get_openclaw_paths()
              # first, the ~/clawd scan is only a non-standard-layout fallback.
              "23-ai-workforce-blueprint/scripts/_qc_company_info.py",
              # 23-ai-workforce-blueprint presentation-render templates: the
              # ~/clawd/secrets/.env item is a legit client-box secret-location
              # fallback in SECRETS_CANDIDATES (tried after ~/.openclaw stores),
              # not a company-root candidate loop. Tracked for removal after
              # fleet migration off the ~/clawd secrets store.
              "23-ai-workforce-blueprint/templates/presentation-render/kie_generate.py",
              "23-ai-workforce-blueprint/templates/role-library/presentations/scripts/build_deck.py",
              "23-ai-workforce-blueprint/templates/role-library/presentations/scripts/kie_generate.py",
              # 58-podcast-production-engine credential resolvers: the
              # ~/clawd/secrets and ~/clawd/secrets/.env items are legit
              # client-box secret-store fallbacks in the multi-store env-file
              # and filename-sweep candidate lists (tried alongside ~/.openclaw
              # and /data/.openclaw), NOT company-root candidate loops. Same
              # tracked exception as the presentation-render templates above;
              # remove after fleet migration off the ~/clawd secrets store.
              "58-podcast-production-engine/scripts/caf/field_layer/resolver.py",
              "58-podcast-production-engine/scripts/ghl_credential_gate.py",
              # 22-book-to-persona
              "22-book-to-persona-coaching-leadership-system/pipeline/orchestrator.py",
              # shared-utils
              "shared-utils/key_resolver.py",
              "shared-utils/api_key_utils.py",
              "shared-utils/llm_score.py",
          }

          # Pattern: a list-item line (trailing comma) containing a local ~/clawd path.
          # Matches:  HOME / "clawd" / ...,
          #           Path.home() / "clawd" / ...,
          #           Path(os.path.expanduser("~/clawd/...")),
          #           os.path.expanduser("~/clawd/..."),
          # Does NOT match single-path assignments (no trailing comma).
          CANDIDATE_LOOP_PAT = re.compile(
              r'^\s*(?:HOME|Path\.home\(\))\s*/\s*["\']clawd["\'].*,\s*(?:#.*)?$'
              r'|^\s*Path\.home\(\)\s*/\s*["\']clawd[^"\']*["\'].*,\s*(?:#.*)?$'
              r'|^\s*Path\(os\.path\.expanduser\(["\']~/clawd/.*\)\)\s*,\s*(?:#.*)?$'
