name: Skill-23 provisioning tests

# Wires the HERMETIC Skill-23 (AI Workforce Blueprint) provisioning tests into CI.
# These tests prove the department/role provisioning pipeline is correct and
# drift-free BEFORE a client box is ever built:
#
#   1. test-department-floor.sh          — the canonical department floor is
#                                           computed from disk truth, seeded-fiction
#                                           bypass closed.
#   2. test-decline-provenance-guard.sh  — a decline is honored ONLY when provenanced;
#                                           builder + floor checker stay in lockstep.
#   3. test-reconciliation-engine.sh     — merge-on-owner-decision only; custom
#                                           roles/SOPs materialized; SOP boundary honored.
#   4. test-ws4-departments.sh           — CEO dept emitted first, vertical packs
#                                           resolve, canonical floor preserved, cross-pack de-dup.
#   5. test-department-instantiation.sh  — a COMPLETE department (presentations)
#                                           instantiates every canonical role; the
#                                           roster == _index.json == folders count
#                                           agreement is asserted LIVE (this is the
#                                           test that caught the 26/32 role drop).
#   6. prove-web-parity.sh               — WEB↔TELEGRAM build-parity self-test: a
#                                           client onboarded through the web /interview
#                                           path runs the SAME canonical build scripts
#                                           as a Telegram-built one, so it clears the
#                                           same Zero-Human-Experience gates AND lands
#                                           an EQUAL provisioning receipt. Runs the
#                                           shipped fixture non-vacuously (good build
#                                           PASSES; every seeded shortcut FAILS). It
#                                           materializes the fixture into a private
#                                           mktemp dir and sandboxes HOME itself, so it
#                                           writes NOTHING under ~/.openclaw or the repo.
#   7. test-phantom-dept-collision-gate.sh — C5: the SAME canonical department can
#                                           never be materialized twice side-by-side
#                                           (billing + billing-finance, legal +
#                                           legal-compliance) and no '.bak' tree may
#                                           be carried as a department. Proves the
#                                           collision detector AND the gate the QC
#                                           pipeline runs (rc=5 AF-PHANTOM-DEPT-TREE)
#                                           plus the reconcile that merges + archives.
#   8. test-chosen-departments-artifact.sh — C7: the departments the client CHOSE are
#                                           persisted as a DURABLE artifact
#                                           (<company>/departments.json + build-state
#                                           canonicalReconciliation.chosenDepartments)
#                                           at reconciliation end, and department-floor
#                                           reads them authoritatively (never fabricated).
#   9. test-vertical-derivation-guard.sh — U107 (E5-2, closes G2a): a vertical is
#                                           NEVER force-added to a client who is not
#                                           that vertical. Independently audits
#                                           provisioned (disk-truth) vertical-specific
#                                           departments against declared verticals
#                                           (build-state verticalPacks record, or
#                                           re-derived from core_answers), asserts
#                                           provisioned ⊆ declared, fails closed on
#                                           unexplained provenance, and proves a
#                                           --check-add refusal primitive returns a
#                                           NAMED error (VERTICAL_NOT_DECLARED) instead
#                                           of silently adding. Also proves its keyword
#                                           match stays in lockstep with
#                                           department-floor.py's (no silent drift
#                                           between the two independent copies).
#  10. test-u109-floor-wipe-regression.sh — U109 (E5-4, closes G2c): interview
#                                           provisioning MERGES the interview-derived
#                                           set onto the department floor
#                                           (floor ∪ derived) instead of REPLACING it.
#                                           Reproduces the wipe (a second/partial
#                                           provisioning call used to drop every
#                                           department a prior, larger call had
#                                           already recorded), then proves the fix:
#                                           zero departments lost across a second
#                                           smaller run or a partial/aborted-interview
#                                           shaped run, and the ONLY way a department
#                                           is absent afterward is an explicit,
#                                           provenance-gated decline (the same
#                                           mechanism U107/U108 already honor).
#  11. test-u110-optout-caller-wiring.sh — U110 (E5-5, closes G2d) provisioning
#                                           caller-wiring: U108 built
#                                           department-optout-sync.py but its own
#                                           CHANGELOG named the caller-wiring gap
#                                           ("routed, not fixed here — owned by
#                                           U110") — with no caller,
#                                           provisioning/department-optout.json was
#                                           NEVER produced on a real box, so the CC
#                                           board read a file nobody wrote. This
#                                           suite RUNS resume-workforce-build.sh
#                                           (the one durable, recurring
#                                           provisioning-flow driver on every box)
#                                           as a real subprocess in a hermetic
#                                           $HOME sandbox and observes the contract
#                                           file it produces — never calls the sync
#                                           function directly. Proves: the caller
#                                           fires unconditionally (even pre-build);
#                                           a real provenance-gated, warning-
#                                           acknowledged decline of a FLOOR
#                                           department ('general-task' — declinable
#                                           per the ratified general-task-is-not-
#                                           exempt ruling) flows end-to-end into the
#                                           written file; an UNCONFIRMED floor
#                                           decline (missing lossWarningAck) never
#                                           lands in optedOut; and a mutation guard
#                                           programmatically excises the sentinel-
#                                           bounded wiring block and confirms the
#                                           contract file stops being produced.
#  12. test-reconcile-orphan-library-files.sh — canonical DELETIONS reach the
#                                           trees the updater's wholesale skill
#                                           replace never touches (the durable
#                                           $OC_CONFIG/onboarding staging tree
#                                           merge-copied by install.sh, and
#                                           strays inside the skill search path),
#                                           WITHOUT it ever being possible to
#                                           remove client-authored content.
#                                           Reproduces the additive merge-copy,
#                                           then proves: dry-run is the default;
#                                           a client-authored file is never
#                                           touched; a locally-modified retired
#                                           file is a CONFLICT, not an orphan;
#                                           removal QUARANTINES (restorable) and
#                                           never unlinks; cold backups are never
#                                           walked; a materialized workforce is
#                                           structurally unreachable; an unusable
#                                           ledger is rc 2 with zero deletions;
#                                           and both call sites stay dry-run.
#
# All are hermetic: each builds its own mktemp sandbox and pins
# ROLE_LIBRARY_PATH to the in-repo skill dir, so they exercise the REPO (the
# source of truth), never a stale ~/.openclaw install, and touch nothing outside
# their sandbox. They depend only on python3 + shasum (both present on
# ubuntu-latest) — no git, no jq, no network.
#
# Runs on every push to main and on any PR that touches 23-ai-workforce-blueprint/**.
# Any suite exiting non-zero fails this job and blocks the merge — so a role-library
# / roster / floor / decline drift can never rot unnoticed again.

on:
  push:
    branches: [main]
    paths:
      - "23-ai-workforce-blueprint/**"
      - ".github/workflows/skill23-provisioning-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "23-ai-workforce-blueprint/**"
      - ".github/workflows/skill23-provisioning-tests.yml"

jobs:
  skill23-provisioning-tests:
    name: Skill-23 provisioning tests (12 hermetic suites)
    runs-on: ubuntu-latest
    env:
      OPENCLAW_PLATFORM: mac
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run the provisioning suites (each exit 0 required)
        shell: bash
        run: |
          set -uo pipefail
          SCRIPTS="23-ai-workforce-blueprint/scripts"
          SUITES=(
            test-department-floor.sh
            test-decline-provenance-guard.sh
            test-reconciliation-engine.sh
            test-ws4-departments.sh
            test-department-instantiation.sh
            prove-web-parity.sh
            test-phantom-dept-collision-gate.sh
            test-chosen-departments-artifact.sh
            test-vertical-derivation-guard.sh
            test-u109-floor-wipe-regression.sh
            test-u110-optout-caller-wiring.sh
            test-reconcile-orphan-library-files.sh
          )
          rc=0
          for s in "${SUITES[@]}"; do
            path="$SCRIPTS/$s"
            echo "======================================================================"
            echo "RUN: $s"
            echo "======================================================================"
            if [ ! -f "$path" ]; then
              echo "FATAL: $path not found" >&2
              rc=1
              continue
            fi
            if bash "$path"; then
              echo "PASS: $s"
            else
              echo "FAIL: $s exited non-zero" >&2
              rc=1
            fi
          done
          echo "======================================================================"
          if [ "$rc" -eq 0 ]; then
            echo "ALL ${#SUITES[@]} SKILL-23 PROVISIONING SUITES PASSED"
          else
            echo "ONE OR MORE SKILL-23 PROVISIONING SUITES FAILED" >&2
          fi
          exit "$rc"
