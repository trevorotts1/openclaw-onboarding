name: u14-blueprint-section-map-guard

# U14 (A-U14, master-spec v2 §A.1.3 / D-A4 Option A, RATIFIED) — Blueprint-
# generation reconciliation. Fails the build if:
#   (a) `personas/_section-map.json` goes stale vs. the 99 on-disk blueprints
#       (a persona added/removed/restructured without regenerating the map),
#       or drops below 100% coverage of the library, including the 4
#       em-dash-heading Template-B variants;
#   (b) the Section-4 load-contract hazard regresses: `shared-utils/
#       persona_for_job.py::section4_excerpt` stops resolving the REAL Agent
#       Governance Framework section for BOTH template generations (Template
#       A -> Section 8, Template B -> Section 4) — proven per-generation
#       against real, committed blueprints, plus the back-compat path (map
#       or persona absent -> literal pre-U14 Section-4 behavior);
#   (c) Skill 23's CHANGELOG.md documentation-debt backfill (persona_blend.py
#       / W7 / P4-01 / P4-02, each under a real versioned entry) regresses.
#
# Deps: the section-map generator (`22-book-to-persona-coaching-leadership-
# system/scripts/build-section-map.py --check`) is the drift lock for (a).

on:
  push:
    paths:
      - "22-book-to-persona-coaching-leadership-system/personas/**/persona-blueprint.md"
      - "22-book-to-persona-coaching-leadership-system/personas/_section-map.json"
      - "22-book-to-persona-coaching-leadership-system/scripts/build-section-map.py"
      - "shared-utils/persona_for_job.py"
      - "23-ai-workforce-blueprint/CHANGELOG.md"
      - tests/unit/u14-blueprint-section-map.test.py
      - .github/workflows/u14-blueprint-section-map-guard.yml
  pull_request:
    paths:
      - "22-book-to-persona-coaching-leadership-system/personas/**/persona-blueprint.md"
      - "22-book-to-persona-coaching-leadership-system/personas/_section-map.json"
      - "22-book-to-persona-coaching-leadership-system/scripts/build-section-map.py"
      - "shared-utils/persona_for_job.py"
      - "23-ai-workforce-blueprint/CHANGELOG.md"
      - tests/unit/u14-blueprint-section-map.test.py
      - .github/workflows/u14-blueprint-section-map-guard.yml

jobs:
  u14-blueprint-section-map-guard:
    name: Blueprint section-map crosswalk — 100% coverage + Section-4 hazard fix, both generations
    runs-on: ubuntu-latest
    env:
      OPENCLAW_PLATFORM: mac
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: persona_for_job.py compiles
        run: python3 -m py_compile shared-utils/persona_for_job.py

      - name: persona_for_job.py self-test (never-naked contract, incl. blend mode)
        run: python3 shared-utils/persona_for_job.py --self-test

      - name: _section-map.json is current (drift lock vs. the 99 on-disk blueprints)
        run: python3 22-book-to-persona-coaching-leadership-system/scripts/build-section-map.py --check

      - name: U14 — 100% coverage + Section-4 load-contract hazard fix (both generations) + CHANGELOG backfill
        run: python3 tests/unit/u14-blueprint-section-map.test.py
