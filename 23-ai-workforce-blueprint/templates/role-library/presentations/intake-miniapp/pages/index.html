<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Presentation Intake</title>
  <style>
    /* One question per screen. No external assets — everything inline so the
       Pages deploy is a single static file. Theme-aware (respects the client's
       light/dark preference). */
    :root {
      --bg: #f7f7f8; --card: #ffffff; --ink: #1c1c22; --muted: #6b6b78;
      --line: #e6e6ee; --accent: #f2b134; --accent-ink: #1c1c22;
      --ok: #1f9d55; --err: #c0392b; --shadow: 0 8px 30px rgba(20,20,40,.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14141a; --card: #1e1e26; --ink: #f2f2f6; --muted: #9a9aa8;
        --line: #2c2c38; --accent: #f2b134; --accent-ink: #1c1c22;
        --shadow: 0 8px 30px rgba(0,0,0,.35);
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--ink);
      font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .bar { height: 4px; background: var(--line); position: sticky; top: 0; z-index: 5; }
    .bar > i { display: block; height: 100%; width: 0%; background: var(--accent); transition: width .35s ease; }
    main {
      flex: 1; width: 100%; max-width: 640px; margin: 0 auto;
      padding: clamp(20px, 5vw, 48px) clamp(18px, 5vw, 32px);
      display: flex; flex-direction: column; justify-content: center;
    }
    .step { color: var(--muted); font-size: 13px; letter-spacing: .04em; text-transform: uppercase; margin-bottom: 14px; }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: 18px;
      padding: clamp(20px, 5vw, 34px); box-shadow: var(--shadow);
    }
    .prompt { font-size: clamp(20px, 4.5vw, 27px); font-weight: 650; line-height: 1.3; margin: 0 0 10px; }
    .help { color: var(--muted); font-size: 15px; margin: 0 0 22px; }
    textarea, input[type="number"], input[type="text"] {
      width: 100%; background: transparent; color: var(--ink);
      border: 1.5px solid var(--line); border-radius: 12px; padding: 13px 14px;
      font: inherit; resize: vertical; min-height: 52px;
    }
    textarea { min-height: 120px; }
    textarea:focus, input:focus { outline: none; border-color: var(--accent); }
    .opts { display: flex; flex-direction: column; gap: 10px; }
    .opt {
      text-align: left; background: transparent; color: var(--ink);
      border: 1.5px solid var(--line); border-radius: 12px; padding: 15px 16px;
      font: inherit; cursor: pointer; transition: border-color .15s, background .15s;
    }
    .opt:hover { border-color: var(--accent); }
    .opt[aria-pressed="true"] { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 14%, transparent); }
    .row { display: flex; gap: 12px; align-items: center; margin-top: 22px; flex-wrap: wrap; }
    button.primary {
      background: var(--accent); color: var(--accent-ink); border: none;
      border-radius: 12px; padding: 13px 26px; font: inherit; font-weight: 650;
      cursor: pointer; min-width: 120px;
    }
    button.primary:disabled { opacity: .45; cursor: not-allowed; }
    button.ghost {
      background: transparent; color: var(--muted); border: 1.5px solid var(--line);
      border-radius: 12px; padding: 13px 18px; font: inherit; cursor: pointer;
    }
    .msg { min-height: 20px; font-size: 14px; margin-top: 12px; }
    .msg.err { color: var(--err); }
    .msg.ok { color: var(--ok); }
    .center { text-align: center; }
    .big { font-size: clamp(24px, 5vw, 34px); font-weight: 720; margin: 10px 0; }
    .code {
      font-variant-numeric: tabular-nums; letter-spacing: .3em; font-size: 22px;
      background: var(--line); padding: 8px 14px; border-radius: 10px; display: inline-block;
    }
    footer { text-align: center; color: var(--muted); font-size: 12px; padding: 18px; }
    .spin { width: 26px; height: 26px; border: 3px solid var(--line); border-top-color: var(--accent);
      border-radius: 50%; animation: sp 0.8s linear infinite; margin: 30px auto; }
    @keyframes sp { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="bar"><i id="progress"></i></div>
  <main id="app">
    <div class="spin" id="loader"></div>
  </main>
  <footer>Your answers are saved as you go — you can close this and come back to the same link.</footer>

  <script>
  (function () {
    "use strict";

    // ---- config + token --------------------------------------------------
    // Token is the last path segment of /s/<token>. API is same-origin /api.
    var API = (window.__INTAKE_API_BASE__ || "") + "/api";
    var token = (function () {
      var m = location.pathname.match(/\/s\/([0-9a-f]{32})/i);
      if (m) return m[1];
      var q = new URLSearchParams(location.search).get("t");
      return q || "";
    })();

    var app = document.getElementById("app");
    var bar = document.getElementById("progress");

    var state = {
      questions: [],
      progress: null,
      answered: [],
      requiresConfirm: false,
      confirmCode: "",
      selected: null,
    };

    // ---- tiny helpers ----------------------------------------------------
    function el(tag, attrs, kids) {
      var e = document.createElement(tag);
      attrs = attrs || {};
      Object.keys(attrs).forEach(function (k) {
        if (k === "class") e.className = attrs[k];
        else if (k === "text") e.textContent = attrs[k];
        else if (k === "html") e.innerHTML = attrs[k];
        else e.setAttribute(k, attrs[k]);
      });
      (kids || []).forEach(function (c) { if (c) e.appendChild(c); });
      return e;
    }
    function clear() { while (app.firstChild) app.removeChild(app.firstChild); }
    function setBar(p) {
      if (!p || !p.total) { bar.style.width = "0%"; return; }
      bar.style.width = Math.round((p.answered / p.total) * 100) + "%";
    }
    function api(path, opts) {
      opts = opts || {};
      opts.headers = Object.assign({ "content-type": "application/json" }, opts.headers || {});
      return fetch(API + path, opts).then(function (r) {
        return r.json().then(function (body) { return { ok: r.ok, status: r.status, body: body }; });
      });
    }

    // ---- boot ------------------------------------------------------------
    function boot() {
      if (!token) return fatal("This intake link is missing its code. Please use the exact link you were sent.");
      api("/sessions/" + token).then(function (res) {
        if (!res.ok) {
          if (res.status === 410) return fatal("This intake link has expired. Ask for a fresh link.");
          if (res.status === 404) return fatal("We couldn't find this intake. Please check your link.");
          if (res.status === 409) return done(true);
          return fatal(res.body && res.body.error ? res.body.error : "Something went wrong loading your intake.");
        }
        state.questions = res.body.questions || [];
        state.progress = res.body.progress;
        state.answered = res.body.answered || [];
        state.requiresConfirm = !!res.body.requires_confirm_code;
        setBar(state.progress);
        if (state.requiresConfirm && !state.confirmCode) return askConfirm();
        if (res.body.status === "complete" || (state.progress && state.progress.complete)) return maybeComplete();
        render();
      }).catch(function () { fatal("Network problem. Please check your connection and reload."); });
    }

    function currentQuestion() {
      var cid = state.progress && state.progress.current_id;
      if (!cid) return null;
      for (var i = 0; i < state.questions.length; i++) {
        if (state.questions[i].id === cid) return state.questions[i];
      }
      return null;
    }

    // ---- confirmation code (optional, high-trust) ------------------------
    function askConfirm() {
      clear();
      var input = el("input", { type: "text", inputmode: "numeric", maxlength: "6", placeholder: "6-digit code" });
      var msg = el("div", { class: "msg" });
      var go = el("button", { class: "primary", text: "Continue" });
      go.onclick = function () {
        state.confirmCode = input.value.trim();
        if (!/^\d{6}$/.test(state.confirmCode)) { msg.className = "msg err"; msg.textContent = "Enter the 6-digit code you were given."; return; }
        state.requiresConfirm = false; render();
      };
      app.appendChild(el("div", { class: "card" }, [
        el("h1", { class: "prompt", text: "Enter your access code" }),
        el("p", { class: "help", text: "You were given a 6-digit code in chat. It keeps this intake private to you." }),
        input, el("div", { class: "row" }, [go]), msg,
      ]));
    }

    // ---- render one question --------------------------------------------
    function render() {
      var q = currentQuestion();
      if (!q) return maybeComplete();
      state.selected = null;
      clear();

      var stepText = "Question " + ((state.progress.current_index || 0) + 1) + " of " + state.progress.total;
      var card = el("div", { class: "card" });
      card.appendChild(el("h1", { class: "prompt", text: q.prompt }));
      if (q.help) card.appendChild(el("p", { class: "help", text: q.help }));

      var inputWrap = el("div");
      var getValue;

      var kind = q.kind || "text";
      if (kind === "enum" && (q.allowed_values || []).length) {
        var opts = el("div", { class: "opts" });
        (q.allowed_values || []).forEach(function (v) {
          var label = (q.value_labels && q.value_labels[v]) || v;
          var b = el("button", { class: "opt", "aria-pressed": "false", text: label });
          b.onclick = function () {
            state.selected = v;
            Array.prototype.forEach.call(opts.children, function (c) { c.setAttribute("aria-pressed", "false"); });
            b.setAttribute("aria-pressed", "true");
            next.disabled = false;
          };
          opts.appendChild(b);
        });
        inputWrap.appendChild(opts);
        getValue = function () { return state.selected; };
      } else if (kind === "boolean") {
        var yn = el("div", { class: "opts" });
        [["true", "Yes"], ["false", "No"]].forEach(function (pair) {
          var b = el("button", { class: "opt", "aria-pressed": "false", text: pair[1] });
          b.onclick = function () {
            state.selected = pair[0];
            Array.prototype.forEach.call(yn.children, function (c) { c.setAttribute("aria-pressed", "false"); });
            b.setAttribute("aria-pressed", "true");
            next.disabled = false;
          };
          yn.appendChild(b);
        });
        inputWrap.appendChild(yn);
        getValue = function () { return state.selected; };
      } else if (kind === "integer") {
        var num = el("input", { type: "number", step: "1", placeholder: q.default != null ? String(q.default) : "" });
        num.oninput = function () { next.disabled = q.required !== false && !num.value.trim(); };
        inputWrap.appendChild(num);
        getValue = function () { return num.value.trim(); };
      } else {
        var ta = el("textarea", { placeholder: "Type your answer…" });
        ta.oninput = function () { next.disabled = q.required !== false && !ta.value.trim(); };
        inputWrap.appendChild(ta);
        getValue = function () { return ta.value.trim(); };
      }
      card.appendChild(inputWrap);

      var msg = el("div", { class: "msg" });
      var next = el("button", { class: "primary", text: "Next" });
      var row = el("div", { class: "row" }, [next]);
      // Optional questions can be skipped to their default.
      if (q.required === false) {
        var skip = el("button", { class: "ghost", text: "Skip" });
        skip.onclick = function () { submit(q, q.default != null ? String(q.default) : "", msg, next); };
        row.appendChild(skip);
      }
      next.disabled = q.required !== false; // enabled once an answer exists
      next.onclick = function () {
        var val = getValue();
        if ((val === null || val === undefined || val === "") && q.required !== false) { return; }
        submit(q, val == null ? "" : String(val), msg, next);
      };

      card.appendChild(row);
      card.appendChild(msg);
      app.appendChild(el("div", {}, [el("div", { class: "step", text: stepText }), card]));
    }

    // ---- submit one answer ----------------------------------------------
    function submit(q, value, msg, next) {
      next.disabled = true;
      msg.className = "msg"; msg.textContent = "Saving…";
      var payload = { question_id: q.id, value: value };
      if (state.confirmCode) payload.confirm_code = state.confirmCode;
      api("/sessions/" + token + "/answers", { method: "POST", body: JSON.stringify(payload) })
        .then(function (res) {
          if (!res.ok) {
            msg.className = "msg err";
            msg.textContent = (res.body && res.body.error) || "That answer wasn't accepted. Please try again.";
            next.disabled = false;
            // If the server says we're out of order, resync from the server.
            if (res.status === 409) return boot();
            return;
          }
          state.progress = res.body.progress;
          if (state.answered.indexOf(q.id) === -1) state.answered.push(q.id);
          setBar(state.progress);
          if (state.progress.complete) return maybeComplete();
          render();
        })
        .catch(function () { msg.className = "msg err"; msg.textContent = "Network problem — retry."; next.disabled = false; });
    }

    // ---- completion ------------------------------------------------------
    function maybeComplete() {
      clear();
      var card = el("div", { class: "card center" });
      card.appendChild(el("h1", { class: "prompt", text: "That's everything — ready to send?" }));
      card.appendChild(el("p", { class: "help", text: "Review is optional. When you send, your presentation team picks it up and may follow up with a question or two." }));
      var go = el("button", { class: "primary", text: "Send my answers" });
      var msg = el("div", { class: "msg" });
      go.onclick = function () {
        go.disabled = true; msg.textContent = "Sending…";
        api("/sessions/" + token + "/complete", { method: "POST", body: "{}" }).then(function (res) {
          if (!res.ok) {
            msg.className = "msg err";
            msg.textContent = (res.body && res.body.error) || "Couldn't send — please try again.";
            if (res.status === 409 && res.body && res.body.missing) return boot();
            go.disabled = false; return;
          }
          done(false);
        }).catch(function () { msg.className = "msg err"; msg.textContent = "Network problem — retry."; go.disabled = false; });
      };
      card.appendChild(el("div", { class: "row", style: "justify-content:center" }, [go]));
      card.appendChild(msg);
      app.appendChild(card);
    }

    function done(already) {
      clear();
      bar.style.width = "100%";
      app.appendChild(el("div", { class: "card center" }, [
        el("div", { class: "big", text: already ? "You're all set" : "Thank you!" }),
        el("p", { class: "help", text: "Your answers are in. Your presentation team has everything they need to start — you can close this tab." }),
      ]));
    }

    function fatal(text) {
      clear();
      app.appendChild(el("div", { class: "card center" }, [
        el("div", { class: "big", text: "Hmm." }),
        el("p", { class: "help", text: text }),
      ]));
    }

    boot();
  })();
  </script>
</body>
</html>
